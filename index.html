      <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "0 0 16px" }}>
        Сюда стекается всё «купить» — из карточек растений и общесадовое. Отметка ✓ уходит в дневник растения, а купленное — на соседнюю полку «Инвентарь».

      {needs.length === 0 ? (

          <div style={{ fontSize: 36 }}>🧺</div>
          <p style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 15, marginTop: 8 }}>
            Список пуст. Записывайте нужное прямо из карточек растений — оно появится здесь.
          </p>

        <div>
          <div style={{ marginBottom: 14 }}>
            <Btn small tone="water" onClick={makeOrder} disabled={aiBusy}>
              {aiBusy ? "Собираю заказ…" : "🌿 Помочь собрать заказ"}
            </Btn>
          </div>
          {order && (
            <div style={{ background: C.waterSoft, borderRadius: 14, padding: "12px 14px", marginBottom: 16, ...sans, fontSize: 14, color: C.ink, whiteSpace: "pre-wrap", lineHeight: 1.55 }}>
              {order}
              <div style={{ marginTop: 8 }}>
                <button onClick={() => setOrder("")}
                  style={{ ...sans, background: "none", border: "none", color: C.water, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                  скрыть

            <div style={{ marginBottom: 18 }}>

/* ─────────────────────────  Инвентарь (раздел)  ───────────────────────── */
function InventoryView({ inventory, plants, journal, apartment, onAdd, onPatch, onRemove, onOpenPlant, showToast }) {
  const [name, setName] = useState("");
  const [cat, setCat] = useState("feed");
  const [note, setNote] = useState("");
  const [busyId, setBusyId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [openId, setOpenId] = useState(null);
  const [openCats, setOpenCats] = useState({});
  const [eName, setEName] = useState("");
  const [eNote, setENote] = useState("");

  function add() {
    if (!name.trim()) return;
    onAdd(name, cat, note);
    setOpenCats((prev) => ({ ...prev, [cat]: true }));
    setName("");
    setNote("");
  }

  async function match(item) {
    setBusyId(item.id);
    try {
      const r = await inventoryMatch(item, plants, journal, apartment);
      onPatch(item.id, { ai: { ...r, at: now() } });
    } catch {
      showToast("Садовник задумался — попробуйте ещё раз");
    }
    setBusyId(null);
  }

  function plantByName(n) {
    return plants.find((p) => (p.nickname || p.name) === n || p.name === n);
  }

  const groups = INV_CATS
    .map((c) => ({ c, items: inventory.filter((i) => (i.category || "other") === c.v) }))
    .filter((g) => g.items.length > 0);

  return (
    <div style={{ maxWidth: 620 }}>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: "4px 0 6px" }}>Инвентарь сада</h2>
      <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "0 0 16px" }}>
        Что стоит на полке: грунты, удобрения, обработки, горшки. Садовник подскажет, кому из сада что подходит, — и будет опираться на это в советах.
      </p>

      <div style={{ background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 16, padding: 14, marginBottom: 20 }}>
        <input style={{ ...inputStyle, marginBottom: 8 }} value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="Bona Forte для декоративно-лиственных / Фитоверм / грунт для ароидных 5 л…" />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {INV_CATS.map((c) => (
            <Chip key={c.v} active={cat === c.v} onClick={() => setCat(c.v)}>{c.t}</Chip>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input style={{ ...inputStyle, flex: 1 }} value={note}
            onChange={(e) => setNote(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && add()}
            placeholder="заметка: объём, сколько осталось… (необязательно)" />
          <Btn small onClick={add} disabled={!name.trim()}>Добавить</Btn>
        </div>
      </div>

      {inventory.length === 0 ? (
        <div style={{ textAlign: "center", padding: "30px 20px" }}>
          <div style={{ fontSize: 36 }}>🧰</div>
          <p style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 15, marginTop: 8 }}>
            Полка пока пуста. Всё купленное из «Нужного» будет появляться здесь само.
          </p>
        </div>
      ) : (
        groups.map(({ c, items }) => {
          const catOpen = !!openCats[c.v];
          return (
          <div key={c.v} style={{ marginBottom: 10 }}>
            <button
              onClick={() => setOpenCats({ ...openCats, [c.v]: !catOpen })}
              style={{ width: "100%", textAlign: "left", background: C.sageSoft + "66", border: `1px solid ${C.line}`, borderRadius: 14, padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "baseline", gap: 8 }}
            >
              <span style={{ ...serif, fontSize: 17, color: C.ink, flex: 1 }}>{c.t}</span>
              <span style={{ ...sans, fontSize: 12, color: C.moss }}>{items.length}</span>
              <span style={{ color: C.sage, fontSize: 11 }}>{catOpen ? "▲" : "▼"}</span>
            </button>
            {catOpen && (
            <div style={{ marginTop: 8 }}>
            {items.map((i) => {
              const open = openId === i.id;
              return (
              <div key={i.id} style={{ background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 14, marginBottom: 8, overflow: "hidden" }}>
                <button
                  onClick={() => { setOpenId(open ? null : i.id); if (editId === i.id) setEditId(null); }}
                  style={{ width: "100%", textAlign: "left", background: "none", border: "none", padding: 12, cursor: "pointer" }}
                >
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                    <div style={{ ...serif, fontSize: 16, flex: 1, color: C.ink }}>{i.name}</div>
                    {i.ai && (i.ai.matches || []).length > 0 && (
                      <span style={{ ...sans, fontSize: 11, color: C.moss, border: `1px solid ${C.sage}`, borderRadius: 999, padding: "1px 8px", whiteSpace: "nowrap" }}>
                        🌿 {i.ai.matches.length}
                      </span>
                    )}
                    <span style={{ color: C.sage, fontSize: 11 }}>{open ? "▲" : "▼"}</span>
                  </div>
                  {i.note && <div style={{ ...sans, fontSize: 12, color: C.moss, marginTop: 2 }}>{i.note}</div>}
                </button>

                {open && (
                  <div style={{ padding: "0 12px 12px" }}>
                    {editId === i.id ? (
                      <div>
                        <input style={{ ...inputStyle, marginBottom: 8 }} value={eName} onChange={(e) => setEName(e.target.value)} />
                        <input style={{ ...inputStyle, marginBottom: 8 }} value={eNote} onChange={(e) => setENote(e.target.value)} placeholder="заметка" />
                        <div style={{ display: "flex", gap: 8 }}>
                          <Btn small onClick={() => { if (eName.trim()) { onPatch(i.id, { name: eName.trim(), note: eNote.trim() }); setEditId(null); } }}>Сохранить</Btn>
                          <Btn small tone="ghost" onClick={() => setEditId(null)}>Отмена</Btn>
                        </div>
                      </div>
                    ) : (
                      <div>
                        {i.ai ? (
                          <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                            <div style={{ ...serif, fontStyle: "italic", fontSize: 13, color: C.moss }}>{i.ai.summary}</div>
                            {(i.ai.matches || []).length > 0 && (
                              <div style={{ marginTop: 6 }}>
                                {i.ai.matches.map((m, k) => {
                                  const p = plantByName(m.plant);
                                  return (
                                    <div key={k} style={{ ...sans, fontSize: 13, padding: "4px 0", color: C.ink }}>
                                      {p ? (
                                        <button onClick={() => onOpenPlant(p.id)}
                                          style={{ ...serif, background: "none", border: "none", color: C.moss, cursor: "pointer", padding: 0, fontSize: 14, textDecoration: "underline" }}>
                                          {m.plant}
                                        </button>
                                      ) : (
                                        <span style={{ ...serif, color: C.moss }}>{m.plant}</span>
                                      )}
                                      {" — "}{m.how}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                            {i.ai.caution && (
                              <div style={{ ...sans, fontSize: 13, color: C.blossom, marginTop: 6 }}>⚠️ {i.ai.caution}</div>
                            )}
                            <button onClick={() => match(i)} disabled={busyId === i.id}
                              style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0, marginTop: 6 }}>
                              {busyId === i.id ? "спрашиваю…" : "спросить заново"}
                            </button>
                          </div>
                        ) : (
                          <div>
                            <Btn small tone="water" onClick={() => match(i)} disabled={busyId === i.id}>
                              {busyId === i.id ? "Подбираю…" : "🌿 Кому подходит?"}
                            </Btn>
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 14, marginTop: 10 }}>
                          <button onClick={() => { setEditId(i.id); setEName(i.name); setENote(i.note || ""); }}
                            style={{ ...sans, background: "none", border: "none", color: C.water, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                            изменить
                          </button>
                          <button onClick={() => { if (window.confirm(`Убрать «${i.name}» из инвентаря?`)) onRemove(i.id); }}
                            style={{ ...sans, background: "none", border: "none", color: C.blossom, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                            убрать
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
              );
            })}
            </div>
            )}
          </div>
          );
        })
      )}
    </div>
  );
}

/* ─────────────────────────  Статистика сада  ───────────────────────── */
function StatsView({ plants, journal, onOpen }) {
  if (plants.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px" }}>
        <LeafMark size={44} />
        <p style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 16, marginTop: 10 }}>
          Цифры появятся вместе с первым растением.
        </p>
      </div>
    );
  }

  const home = plants.filter((p) => p.location !== "balcony").length;
  const balcony = plants.length - home;
  const ageOf = (p) => (p.ownedSince ? new Date(p.ownedSince + "-01T00:00:00") : new Date(p.addedAt));
  const oldest = [...plants].sort((a, b) => ageOf(a) - ageOf(b))[0];
  const capricious = plants.filter((p) => /каприз/i.test(p.care?.difficulty || ""));
  const thirstiest = [...plants]
    .filter((p) => p.care?.wateringSummer)
    .sort((a, b) => a.care.wateringSummer - b.care.wateringSummer)[0];

  const allEntries = Object.entries(journal)
    .flatMap(([pid, arr]) => (arr || []).map((e) => ({ ...e, plant: plants.find((p) => p.id === pid) })))
    .filter((x) => x.plant);
  const waters30 = allEntries.filter((e) => e.type === "water" && daysSince(e.date) <= 30).length;
  const recent = [...allEntries].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 12);

  const feeds30 = allEntries.filter((e) => e.type === "feed" && daysSince(e.date) <= 30).length;
  const calm = [...plants]
    .filter((p) => p.care && p.care.wateringSummer)
    .sort((a, b) => b.care.wateringSummer - a.care.wateringSummer)[0];
  const newest = plants.length > 1 ? [...plants].sort((a, b) => ageOf(b) - ageOf(a))[0] : null;
  const heroEntry = [...plants]
    .map((p) => ({ p, n: (journal[p.id] || []).length }))
    .sort((a, b) => b.n - a.n)[0];
  const photoStar = [...plants]
    .map((p) => ({ p, n: (p.gallery || []).length }))
    .sort((a, b) => b.n - a.n)[0];
  const warmest = [...plants]
    .filter((p) => p.care && p.care.minTempC != null)
    .sort((a, b) => b.care.minTempC - a.care.minTempC)[0];
  const spotCount = {};
  plants.forEach((p) => {
    const s = p.spot || (p.location === "balcony" ? "балкон" : "без места");
    spotCount[s] = (spotCount[s] || 0) + 1;
  });
  const topSpot = Object.entries(spotCount).sort((a, b) => b[1] - a[1])[0];
  const urgentPlants = plants.filter((p) => {
    const d = (journal[p.id] || []).find((e) => e.type === "diagnosis");
    return d && d.severity === "urgent";
  });
  const diff = { simple: 0, mid: 0, hard: 0 };
  plants.forEach((p) => {
    const t = ((p.care && p.care.difficulty) || "").toLowerCase();
    if (t.includes("прост")) diff.simple++;
    else if (t.includes("каприз")) diff.hard++;
    else if (t) diff.mid++;
  });
  const withAge = plants.filter((p) => p.ownedSince);
  const avgYears = withAge.length
    ? withAge.reduce((s, p) => s + (Date.now() - ageOf(p)) / 31557600000, 0) / withAge.length
    : null;
  const fmtStay = (y) =>
    y < 1 ? `${Math.max(1, Math.round(y * 12))} мес.` : `${(Math.round(y * 10) / 10).toString().replace(".", ",")} г.`;

  const StatCard = ({ icon, value, label, onClick }) => (
    <button
      onClick={onClick}
      disabled={!onClick}
      style={{
        background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 16, padding: "14px 16px",
        textAlign: "left", cursor: onClick ? "pointer" : "default",
      }}
    >
      <div style={{ fontSize: 20 }}>{icon}</div>
      <div style={{ ...serif, fontSize: 19, color: C.ink, marginTop: 4 }}>{value}</div>
      <div style={{ ...sans, fontSize: 12, color: C.moss, marginTop: 2 }}>{label}</div>
    </button>
  );

  return (
    <div>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: "4px 0 6px" }}>Сад в цифрах</h2>
      {diff.simple + diff.mid + diff.hard > 0 && (
        <p style={{ ...sans, fontSize: 13, color: C.moss, margin: "0 0 14px" }}>
          характеры: {diff.simple} {plural(diff.simple, "простой", "простых", "простых")} · {diff.mid} {plural(diff.mid, "средний", "средних", "средних")} · {diff.hard} {plural(diff.hard, "капризный", "капризных", "капризных")}
        </p>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 10 }}>
        <StatCard icon="🌿" value={plants.length} label={`${plural(plants.length, "растение", "растения", "растений")} всего`} />
        <StatCard icon="🏠" value={home} label="живут дома" />
        <StatCard icon="🌤" value={balcony} label="на балконе" />
        <StatCard icon="💧" value={waters30} label={`${plural(waters30, "полив", "полива", "поливов")} за месяц`} />
        {oldest && (
          <StatCard icon="🌳" value={oldest.nickname || oldest.name}
            label={`старейшина, ${oldest.ownedSince ? "у вас с " + fmtMonth(oldest.ownedSince) : "в каталоге с " + fmtDate(oldest.addedAt)}`} onClick={() => onOpen(oldest.id)} />
        )}
        {thirstiest && (
          <StatCard icon="🚿" value={thirstiest.nickname || thirstiest.name}
            label={`самое водолюбивое — раз в ${thirstiest.care.wateringSummer} дн.`} onClick={() => onOpen(thirstiest.id)} />
        )}
        {capricious.length > 0 && (
          <StatCard icon="👑" value={capricious.map((p) => p.nickname || p.name).join(", ")}
            label={plural(capricious.length, "капризное создание", "капризных создания", "капризных созданий")} />
        )}
        <StatCard icon="🍽" value={feeds30} label={`${plural(feeds30, "подкормка", "подкормки", "подкормок")} за месяц`} />
        {calm && (!thirstiest || calm.id !== thirstiest.id) && (
          <StatCard icon="🐫" value={calm.nickname || calm.name}
            label={`самое неприхотливое — полив раз в ${calm.care.wateringSummer} дн.`} onClick={() => onOpen(calm.id)} />
        )}
        {newest && (
          <StatCard icon="🌱" value={newest.nickname || newest.name}
            label={`новичок сада, ${newest.ownedSince ? "у вас с " + fmtMonth(newest.ownedSince) : "с " + fmtDate(newest.addedAt)}`}
            onClick={() => onOpen(newest.id)} />
        )}
        {heroEntry && heroEntry.n > 2 && (
          <StatCard icon="📔" value={heroEntry.p.nickname || heroEntry.p.name}
            label={`герой дневника — ${heroEntry.n} ${plural(heroEntry.n, "запись", "записи", "записей")}`}
            onClick={() => onOpen(heroEntry.p.id)} />
        )}
        {photoStar && photoStar.n > 1 && (
          <StatCard icon="📸" value={photoStar.p.nickname || photoStar.p.name}
            label={`фотозвезда — ${photoStar.n} ${plural(photoStar.n, "снимок", "снимка", "снимков")}`}
            onClick={() => onOpen(photoStar.p.id)} />
        )}
        {warmest && (
          <StatCard icon="🥶" value={warmest.nickname || warmest.name}
            label={`самое теплолюбивое — не ниже ${warmest.care.minTempC}°C`}
            onClick={() => onOpen(warmest.id)} />
        )}
        {topSpot && topSpot[1] > 1 && (
          <StatCard icon="🏘" value={topSpot[0]}
            label={`самое населённое место — ${topSpot[1]} ${plural(topSpot[1], "растение", "растения", "растений")}`} />
        )}
        {avgYears != null && (
          <StatCard icon="⏳" value={fmtStay(avgYears)} label="средний стаж жильцов в доме" />
        )}
        {urgentPlants.length > 0 && (
          <StatCard icon="🚑" value={urgentPlants.map((p) => p.nickname || p.name).join(", ")}
            label="последний осмотр тревожный — проверить" />
        )}
      </div>

      <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "26px 0 10px" }}>Хроника сада</h3>
      {recent.length === 0 ? (
        <p style={{ ...sans, fontSize: 14, color: C.sage }}>Событий пока нет — первая запись появится с первым поливом.</p>
      ) : (
        recent.map((e) => (
          <div key={e.id} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: `1px solid ${C.line}`, ...sans, fontSize: 14, alignItems: "baseline" }}>
            <div style={{ color: C.sage, whiteSpace: "nowrap", fontSize: 13 }}>{fmtDate(e.date)}</div>
            <button onClick={() => onOpen(e.plant.id)} style={{ ...serif, background: "none", border: "none", color: C.moss, cursor: "pointer", padding: 0, fontSize: 14, whiteSpace: "nowrap" }}>
              {e.plant.nickname || e.plant.name}
            </button>
            <div style={{ color: C.ink }}>{e.text}</div>
          </div>
        ))
      )}
    </div>
  );
}

/* ─────────────────────────  Профиль квартиры  ───────────────────────── */
function ProfileSetup({ profile, firstRun, onSave, onCancel, onImport, syncAvailable, sync, onEnableSync, onConnectSync, onDisableSync }) {
  const [connCode, setConnCode] = useState("");
  const [copied, setCopied] = useState(false);

  function copyCode() {
    if (navigator.clipboard && navigator.clipboard.writeText && sync && sync.code) {
      navigator.clipboard.writeText(sync.code).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      });
    }
  }

  const existingHome = profile && profile.spots ? profile.spots.filter((s) => !s.isBalcony) : [];
  const existingBalcony = profile && profile.spots ? profile.spots.find((s) => s.isBalcony) : null;

  const [spots, setSpots] = useState(
    existingHome.length > 0
      ? existingHome
      : [{ id: uid(), label: "", orientation: "south", isBalcony: false }]
  );
  const [hasBalcony, setHasBalcony] = useState(!!existingBalcony);
  const [balconyLabel, setBalconyLabel] = useState(existingBalcony ? existingBalcony.label : "Балкон");
  const [balconyOrient, setBalconyOrient] = useState(existingBalcony ? existingBalcony.orientation : "south");
  const [balconyGlazed, setBalconyGlazed] = useState(profile ? profile.balconyGlazed : null);
  const [notes, setNotes] = useState((profile && profile.notes) || "");

  const canSave = spots.some((s) => s.label.trim()) || hasBalcony;

  function patchSpot(id, patch) {
    setSpots(spots.map((s) => (s.id === id ? { ...s, ...patch } : s)));
  }

  function save() {
    const cleanHome = spots
      .map((s) => ({ ...s, label: s.label.trim(), isBalcony: false }))
      .filter((s) => s.label);
    const all = hasBalcony
      ? [...cleanHome, { id: uid(), label: balconyLabel.trim() || "Балкон", orientation: balconyOrient, isBalcony: true }]
      : cleanHome;
    if (all.length === 0) return;
    onSave({
      spots: all,
      balconyGlazed: hasBalcony ? balconyGlazed : null,
      notes: notes.trim(),
    });
  }

  return (
    <div style={{ maxWidth: 600 }}>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 24, margin: "4px 0 8px" }}>
        {firstRun ? "Расскажите про квартиру" : "Настройки квартиры"}
      </h2>
      <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "0 0 20px", lineHeight: 1.5 }}>
        {firstRun
          ? "Один раз опишите места, где будут жить растения, — и все советы (свет, полив, куда поставить новичка, диагнозы) будут именно про вашу квартиру, а не про абстрактную."
          : "Изменения коснутся всех будущих советов. Паспорта уже посаженных растений можно освежить кнопкой «обновить» в их карточках."}
      </p>

      <Field label="Места в комнатах, где живут растения">
        {spots.map((s) => (
          <div key={s.id} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center", flexWrap: "wrap" }}>
            <input
              style={{ ...inputStyle, flex: 2, minWidth: 150 }}
              value={s.label}
              onChange={(e) => patchSpot(s.id, { label: e.target.value })}
              placeholder="окно гостиной / стеллаж в спальне"
            />
            <select
              style={{ ...inputStyle, flex: 1, minWidth: 150 }}
              value={s.orientation}
              onChange={(e) => patchSpot(s.id, { orientation: e.target.value })}
            >
              {ORIENTATIONS.map((o) => (
                <option key={o.v} value={o.v}>
                  {o.v === "inside" ? "не у окна" : "окна на " + o.t}
                </option>
              ))}
            </select>
            {spots.length > 1 && (
              <button
                onClick={() => setSpots(spots.filter((x) => x.id !== s.id))}
                title="убрать место"
                style={{ ...sans, background: "none", border: "none", color: C.sage, cursor: "pointer", fontSize: 17 }}
              >
                ×
              </button>
            )}
          </div>
        ))}
        <button
          onClick={() => setSpots([...spots, { id: uid(), label: "", orientation: "south", isBalcony: false }])}
          style={{ ...sans, background: "none", border: "none", color: C.moss, cursor: "pointer", fontSize: 13, textDecoration: "underline", padding: 0 }}
        >
          + добавить место
        </button>
      </Field>

      <Field label="Балкон">
        <div style={{ display: "flex", gap: 8 }}>
          <Chip active={hasBalcony} onClick={() => setHasBalcony(true)}>Есть</Chip>
          <Chip active={!hasBalcony} onClick={() => setHasBalcony(false)}>Нет</Chip>
        </div>
        {hasBalcony && (
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <input
                style={{ ...inputStyle, flex: 2, minWidth: 150 }}
                value={balconyLabel}
                onChange={(e) => setBalconyLabel(e.target.value)}
                placeholder="Балкон / лоджия"
              />
              <select
                style={{ ...inputStyle, flex: 1, minWidth: 150 }}
                value={balconyOrient}
                onChange={(e) => setBalconyOrient(e.target.value)}
              >
                {ORIENTATIONS.filter((o) => o.v !== "inside").map((o) => (
                  <option key={o.v} value={o.v}>окна на {o.t}</option>
                ))}
              </select>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <Chip active={balconyGlazed === true} onClick={() => setBalconyGlazed(true)}>Застеклён</Chip>
              <Chip active={balconyGlazed === false} onClick={() => setBalconyGlazed(false)}>Открытый</Chip>
            </div>
          </div>
        )}
      </Field>

      <Field label="Ещё о квартире (по желанию, но очень помогает советам)">
        <textarea
          style={{ ...inputStyle, minHeight: 84, resize: "vertical" }}
          value={notes}
          onChange={(e) => setNotes(e.target.value)}
          placeholder="этаж и затенение (деревья, дом напротив), батареи под окнами, фитолампы, домашние животные, город…"
        />
      </Field>

      <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
        <Btn onClick={save} disabled={!canSave}>
          {firstRun ? "Открыть сад 🌱" : "Сохранить"}
        </Btn>
        {!firstRun && <Btn tone="ghost" onClick={onCancel}>Отмена</Btn>}
      </div>

      {syncAvailable && (
        <div style={{ marginTop: 28, paddingTop: 18, borderTop: `1px solid ${C.line}` }}>
          <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "0 0 8px" }}>
            🔗 Синхронизация между устройствами
          </h3>
          {sync && sync.code ? (
            <div>
              <p style={{ ...sans, fontSize: 13, color: C.moss, margin: "0 0 10px", lineHeight: 1.5 }}>
                Сад синхронизируется. Введите этот код на другом устройстве — и там откроется этот же сад
                (можно и вдвоём: тогда изменения видны обоим). Сохраните код в надёжном месте.
              </p>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <code style={{ background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 10, padding: "8px 12px", fontSize: 14, color: C.ink }}>
                  {sync.code}
                </code>
                <Btn small tone="ghost" onClick={copyCode}>{copied ? "✓ Скопирован" : "📋 Скопировать"}</Btn>
              </div>
              <div style={{ ...sans, fontSize: 12, color: C.sage, marginTop: 8 }}>
                последняя синхронизация: {sync.at ? new Date(sync.at).toLocaleString("ru-RU") : "—"}
              </div>
              <button onClick={onDisableSync}
                style={{ ...sans, background: "none", border: "none", color: C.blossom, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0, marginTop: 10 }}>
                отключить синхронизацию на этом устройстве
              </button>
            </div>
          ) : (
            <div>
              <p style={{ ...sans, fontSize: 13, color: C.moss, margin: "0 0 10px", lineHeight: 1.5 }}>
                Включите, чтобы открывать сад с других устройств по коду — или вести один сад вдвоём.
              </p>
              <Btn small onClick={onEnableSync}>Включить и получить код</Btn>
              <div style={{ marginTop: 14 }}>
                <div style={{ ...sans, fontSize: 12, color: C.moss, marginBottom: 5 }}>
                  Уже есть код с другого устройства?
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input style={{ ...inputStyle, flex: 1 }} value={connCode}
                    onChange={(e) => setConnCode(e.target.value)}
                    placeholder="sad-xxxx-xxxx-xxxx-xxxx" />
                  <Btn small tone="water" onClick={() => onConnectSync(connCode)} disabled={!connCode.trim()}>
                    Подключить
                  </Btn>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {firstRun && onImport && (
        <div style={{ marginTop: 24 }}>
          <button onClick={onImport}
            style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
            уже вели сад? восстановить всё из скачанной копии
          </button>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────  Режим «отпуск»  ───────────────────────── */
function VacationView({ plants, dueInfoFn, onBack, showToast }) {
  const iso = (d) => {
    const x = new Date(d);
    x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
    return x.toISOString().slice(0, 10);
  };
  const [from, setFrom] = useState(iso(new Date()));
  const [to, setTo] = useState(iso(new Date(Date.now() + 13 * 86400000)));

  const fromD = new Date(from + "T00:00:00");
  const toD = new Date(to + "T00:00:00");
  const valid = from && to && fromD <= toD;

  const plan = valid
    ? plants.map((p) => {
        const d = dueInfoFn(p);
        if (!d.interval) return { p, dates: [] };
        const base = new Date(p.lastWatered || p.addedAt);
        base.setHours(0, 0, 0, 0);
        const step = d.interval * 86400000;
        let t = base.getTime() + step;
        if (t < fromD.getTime()) t += Math.ceil((fromD.getTime() - t) / step) * step;
        const dates = [];
        while (t <= toD.getTime()) { dates.push(iso(new Date(t))); t += step; }
        return { p, dates };
      })
    : [];

  const byDate = {};
  plan.forEach(({ p, dates }) => dates.forEach((k) => { (byDate[k] = byDate[k] || []).push(p); }));
  const days = Object.keys(byDate).sort();
  const resting = plan.filter((x) => x.dates.length === 0).map((x) => x.p);
  const fmtDay = (k) =>
    new Date(k + "T00:00:00").toLocaleDateString("ru-RU", { weekday: "short", day: "numeric", month: "long" });

  function buildText() {
    let s = `🌿 Памятка по поливу сада (${fmtDay(from)} — ${fmtDay(to)})\n\n`;
    days.forEach((k) => {
      s += `${fmtDay(k)}: ` + byDate[k].map((p) => `${p.nickname || p.name}${p.spot ? " (" + p.spot + ")" : ""}`).join(", ") + "\n";
    });
    const drinkers = plan.filter((x) => x.dates.length);
    if (drinkers.length) {
      s += "\nКак поливать:\n";
      drinkers.forEach(({ p }) => {
        s += `• ${p.nickname || p.name}: ${p.care && p.care.wateringNote ? p.care.wateringNote : "умеренно, отстоянной водой комнатной температуры"}\n`;
      });
    }
    if (resting.length) {
      s += `\nНе трогать (полив не нужен): ${resting.map((p) => p.nickname || p.name).join(", ")}.\n`;
    }
    s += "\nПодкормки на время отпуска пропускаем. Спасибо! 🌱";
    return s;
  }

  function copyText() {
    const text = buildText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showToast("Памятка скопирована 📋"),
        () => showToast("Не удалось скопировать")
      );
    } else {
      showToast("Копирование недоступно в этом браузере");
    }
  }

  function openPrint() {
    const esc = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const drinkers = plan.filter((x) => x.dates.length);
    const html = `<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><title>Памятка по поливу</title>
<style>body{font-family:Georgia,serif;color:#2e4433;background:#f7f6ef;max-width:640px;margin:0 auto;padding:28px 20px}
h1{font-weight:400;font-size:24px}h2{font-weight:400;font-size:17px;margin:22px 0 8px}
.d{margin:6px 0}.n{color:#4a6b4f}.muted{color:#7d9b76;font-style:italic}
li{margin:4px 0;font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px}
@media print{body{background:#fff}}</style></head><body>
<h1>🌿 Памятка по поливу сада</h1>
<div class="muted">${esc(fmtDay(from))} — ${esc(fmtDay(to))}</div>
<h2>Календарь</h2>
${days.map((k) => `<div class="d"><b>${esc(fmtDay(k))}:</b> <span class="n">${byDate[k].map((p) => esc((p.nickname || p.name) + (p.spot ? " (" + p.spot + ")" : ""))).join(", ")}</span></div>`).join("")}
${drinkers.length ? `<h2>Как поливать</h2><ul>${drinkers.map(({ p }) => `<li><b>${esc(p.nickname || p.name)}</b>: ${esc(p.care && p.care.wateringNote ? p.care.wateringNote : "умеренно, отстоянной водой комнатной температуры")}</li>`).join("")}</ul>` : ""}
${resting.length ? `<h2>Не трогать</h2><div class="d">Полив в этот период не нужен: ${resting.map((p) => esc(p.nickname || p.name)).join(", ")}.</div>` : ""}
<p class="muted">Подкормки на время отпуска пропускаем. Спасибо! 🌱</p>
</body></html>`;
    const url = URL.createObjectURL(new Blob([html], { type: "text/html" }));
    window.open(url, "_blank");
  }

  return (
    <div style={{ maxWidth: 600 }}>
      <button onClick={onBack} style={{ ...sans, background: "none", border: "none", color: C.moss, cursor: "pointer", fontSize: 14, padding: 0, marginBottom: 14 }}>
        ← к сегодняшним делам
      </button>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: "0 0 6px" }}>Режим «отпуск» 🏖</h2>
      <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "0 0 16px" }}>
        Готовая памятка для того, кто останется поливать: календарь по датам и инструкции по каждому растению.
      </p>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
        <label style={{ flex: 1, minWidth: 140 }}>
          <div style={{ ...sans, fontSize: 12, color: C.moss, marginBottom: 4 }}>Уезжаем</div>
          <input type="date" style={inputStyle} value={from} onChange={(e) => setFrom(e.target.value)} />
        </label>
        <label style={{ flex: 1, minWidth: 140 }}>
          <div style={{ ...sans, fontSize: 12, color: C.moss, marginBottom: 4 }}>Возвращаемся</div>
          <input type="date" style={inputStyle} value={to} onChange={(e) => setTo(e.target.value)} />
        </label>
      </div>

      {!valid ? (
        <p style={{ ...sans, fontSize: 14, color: C.blossom }}>Дата возвращения раньше отъезда — проверьте.</p>
      ) : days.length === 0 ? (
        <p style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 15 }}>
          На эти даты поливов не выпадает — сад справится сам. Счастливого пути! 🌱
        </p>
      ) : (
        <div>
          <div style={{ background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
            {days.map((k) => (
              <div key={k} style={{ ...sans, fontSize: 14, padding: "5px 0", borderBottom: `1px solid ${C.line}` }}>
                <b style={{ ...serif, fontWeight: 400 }}>{fmtDay(k)}:</b>{" "}
                <span style={{ color: C.moss }}>
                  {byDate[k].map((p) => (p.nickname || p.name) + (p.spot ? ` (${p.spot})` : "")).join(", ")}
                </span>
              </div>
            ))}
            {resting.length > 0 && (
              <div style={{ ...sans, fontSize: 13, color: C.sage, marginTop: 8 }}>
                Полив не понадобится: {resting.map((p) => p.nickname || p.name).join(", ")}.
              </div>
            )}
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <Btn tone="water" onClick={copyText}>📋 Скопировать для мессенджера</Btn>
            <Btn tone="ghost" onClick={openPrint}>🖨 Открыть для печати</Btn>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<MyGarden />);

</script>
</body>
