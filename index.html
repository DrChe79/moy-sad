<script>/* ═══ «Мой сад» — автономная версия ═══ */
const PROXY_URL = "https://moy-sad.cherninmaxim.workers.dev";
const AI_READY = /^https?:\/\//.test(PROXY_URL);
const {
  useState,
  useEffect,
  useRef,
  useMemo
} = React;
const appStorage = {
  async get(key) {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error("no key");
    return {
      key,
      value: v
    };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return {
      key,
      value
    };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return {
      key,
      deleted: true
    };
  }
};

/* ─────────────────────────  Палитра «нежный ботанический»  ───────────────────────── */
const C = {
  paper: "#f7f6ef",
  paperDeep: "#efeee2",
  ink: "#2e4433",
  moss: "#4a6b4f",
  sage: "#7d9b76",
  sageSoft: "#dce6d5",
  leaf: "#a8c39a",
  blossom: "#a86a7c",
  blossomSoft: "#f0dfe4",
  water: "#6b8fa3",
  waterSoft: "#dde8ec",
  sun: "#c9a15a",
  line: "#d8d6c6"
};
const APP_VERSION = "15.07-14:36";
const serif = {
  fontFamily: "Georgia, 'Times New Roman', serif"
};
const sans = {
  fontFamily: "-apple-system, 'Segoe UI', Roboto, sans-serif"
};

/* ─────────────────────────  Помощники  ───────────────────────── */
const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => new Date().toISOString();
const isSummer = () => {
  const m = new Date().getMonth() + 1;
  return m >= 4 && m <= 9;
};
const daysSince = iso => {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
};
const isoDate = d => {
  const x = new Date(d);
  x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
  return x.toISOString().slice(0, 10);
};
/* Разница в КАЛЕНДАРНЫХ днях (игнорируя время суток): задачи «созревают» с началом дня,
   поэтому утром уже видно всё, что назрело на сегодня, а не по истечении полных суток. */
const calDaysSince = iso => {
  if (!iso) return null;
  const then = new Date(iso);
  const a = new Date(then.getFullYear(), then.getMonth(), then.getDate());
  const now = new Date();
  const b = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((b - a) / 86400000);
};
const fmtDate = iso => new Date(iso).toLocaleDateString("ru-RU", {
  day: "numeric",
  month: "long"
});

/* Подпись под названием: единый ориентир вида — русское название (commonName),
   иначе латинское. Одинаково для всех растений вида, даже если дублирует заголовок. */
function shortSpot(spot) {
  if (!spot) return "";
  // убираем ориентацию окон и освещённость в скобках, оставляя помещение + уточнение
  return spot.replace(/\s*\(.*?\)\s*/g, " ") // "(яркий рассеянный свет)"
  .replace(/,?\s*окна на[^,]*/gi, "") // ", окна на запад"
  .replace(/,?\s*не у окна/gi, "") // ", не у окна"
  .replace(/\s{2,}/g, " ").replace(/[,\s]+$/, "").trim();
}

/* Сжатие фото: maxSide px, JPEG */
function compressImage(file, maxSide, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {
          width,
          height
        } = img;
        if (width > maxSide || height > maxSide) {
          const k = maxSide / Math.max(width, height);
          width = Math.round(width * k);
          height = Math.round(height * k);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function parseJson(text) {
  let clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  let body = clean.slice(start, end + 1);
  // чистим типичные огрехи ИИ: многоточия-заглушки и висячие запятые перед ] или }
  body = body.replace(/,\s*\.\.\.\s*/g, " ") // "a", ... →  "a"
  .replace(/\[\s*\.\.\.\s*\]/g, "[]") // [ ... ] → []
  .replace(/\.\.\./g, "") // прочие многоточия
  .replace(/,\s*([\]}])/g, "$1"); // висячая запятая перед ] или }
  return JSON.parse(body);
}

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));

    a[i] = a[j];
    a[j] = t;
  }
  return a;
}
