function plural(n, one, few, many) {
  const a = Math.abs(n) % 100;
  const b = a % 10;
  if (a > 10 && a < 20) return many;
  if (b > 1 && b < 5) return few;
  if (b === 1) return one;

}

/* Сжатие фото: maxSide px, JPEG */
function compressImage(file, maxSide, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSide || height > maxSide) {
          const k = maxSide / Math.max(width, height);
          width = Math.round(width * k);
          height = Math.round(height * k);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ─────────────────────────  Работа с ИИ  ───────────────────────── */
async function askClaude(messages) {
  if (!AI_READY) throw new Error("proxy not configured");
  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1200,
      messages,
    }),
  });
  if (!response.ok) throw new Error("api " + response.status);
  const data = await response.json();
  return (data.content || [])
    .map((b) => (b.type === "text" ? b.text : ""))
    .filter(Boolean)
    .join("\n");
}

function parseJson(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  return JSON.parse(clean.slice(start, end + 1));
}

function buildGardenContext(plants, journal) {
  const lines = plants.map((p) => {
    const dw = daysSince(p.lastWatered || p.addedAt);
    const recent = (journal[p.id] || [])
      .slice(0, 3)
      .map((e) => `${fmtDate(e.date)}: ${e.text}`)
      .join("; ");
    return `• ${p.name}${p.nickname ? ` («${p.nickname}»)` : ""} (${p.care?.latinName || "?"}) — ${
      p.location === "balcony" ? "балкон" : "дома"
    }${p.spot ? `, ${p.spot}` : ""}; полив каждые ${
      isSummer() ? p.care?.wateringSummer : p.care?.wateringWinter
    } дн., последний полив ${dw === null ? "неизвестно" : dw + " дн. назад"}.${
      p.ownedSince ? " У хозяев с " + fmtMonth(p.ownedSince) + "." : ""
    }${
      p.care?.soil ? " Грунт: " + p.care.soil + "." : ""
    }${
      recent ? " Недавнее: " + recent : ""
    }`;
  });
  return lines.join("\n");
}

    .map((e) => e.text)
    .join("; ");
  const prompt = `Ты — тёплый садовник домашнего сада. Одной короткой фразой (до 18 слов, по-русски, без кавычек и без эмодзи в начале) опиши настроение сада сегодня. Ласково, живо, без пафоса, можно с лёгкой улыбкой.
Данные: растений в саду ${plants.length}; хотят пить сейчас: ${dueCount}; последние события: ${events || "тихо, без событий"}.`;
  const text = await askClaude([{ role: "user", content: prompt }]);
  return (text || "").trim().replace(/^["«]|["»]$/g, "");
}

/* ─────────────────────────  Мелкие компоненты  ───────────────────────── */
function LeafMark({ size = 20, color = C.sage }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 21C12 21 4 16 4 9.5C4 5 8 3 12 3C16 3 20 5 20 9.5C20 16 12 21 12 21Z"
        fill={color}
        opacity="0.25"
      />
      <path d="M12 21C12 21 12 10 12 5" stroke={color} strokeWidth="1.3" strokeLinecap="round" />
      <path
        d="M12 12C10 11 8.5 9.5 8 7.5M12 15.5C14 14.5 15.5 13 16 11"
        stroke={color}
        strokeWidth="1.1"
        strokeLinecap="round"
      />
    </svg>
  );
}

function Watercolor() {
  /* акварельные пятна за заголовком */
  const blob = (bg, w, h, top, left, blur) => ({
    position: "absolute",
    width: w,
    height: h,
    top,
    left,
    background: bg,
    borderRadius: "50% 60% 55% 45% / 55% 45% 60% 50%",
    filter: `blur(${blur}px)`,
    opacity: 0.5,
    pointerEvents: "none",
  });
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden" }} aria-hidden="true">
      <div style={blob(C.leaf, 220, 160, -60, -40, 30)} />
      <div style={blob(C.sageSoft, 260, 180, -30, "55%", 26)} />
      <div style={blob(C.blossomSoft, 150, 120, 30, "82%", 24)} />
      <div style={blob(C.waterSoft, 170, 130, 40, "30%", 28)} />
    </div>
  );
}

      onClick={onClick}

      {children}
    </button>

}

function Btn({ onClick, children, tone = "moss", disabled, small }) {

      onClick={onClick}
      disabled={disabled}
      style={{

        padding: small ? "7px 14px" : "11px 20px",

function Field({ label, children }) {

/* ─────────────────────────  Главный компонент  ───────────────────────── */
function MyGarden() {
  const [plants, setPlants] = useState([]);
  const [journal, setJournal] = useState({});
  const [wishlist, setWishlist] = useState([]);
  const [needs, setNeeds] = useState([]);
  const [inventory, setInventory] = useState([]);
  const [profile, setProfile] = useState(null);
  const [prefillName, setPrefillName] = useState("");
  const [lastBackup, setLastBackup] = useState(() => {
    const v = localStorage.getItem("garden:lastBackup");
    return v ? Number(v) : null;
  });
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("garden"); // garden | today | chat | add | plant
  const [openId, setOpenId] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [mood, setMood] = useState("");
  const [sync, setSync] = useState({ code: null, at: null });
  const syncTimer = useRef(null);
  const sizeWarned = useRef(false);

  /* ── загрузка / сохранение ── */
  useEffect(() => {
    (async () => {
      let localStr = null;
      let localUpdated = 0;
      try {
        const res = await appStorage.get("garden:data");
        if (res && res.value) {
          localStr = res.value;
          const d = JSON.parse(res.value);
          setPlants(d.plants || []);
          setJournal(d.journal || {});
          setWishlist(d.wishlist || []);
          setNeeds(d.needs || []);
          setInventory(d.inventory || []);
          setProfile(d.profile || null);
          localUpdated = d.updatedAt || 0;
        }
      } catch (e) {
        /* сада ещё нет — начинаем с чистого листа */
      }

      let code = null;
      if (SYNC_BASE) {
        try {
          const s = await appStorage.get("garden:sync");
          code = (JSON.parse(s.value) || {}).code || null;
        } catch (e) { /* синхронизация не включена */ }
      }
      if (code) setSync({ code, at: null });
      setLoaded(true);

      if (code) {
        try {
          const r = await fetch(SYNC_BASE + "/sync/get?code=" + encodeURIComponent(code));
          if (r.ok) {
            const j = await r.json();
            if (j && j.data && (j.updatedAt || 0) > localUpdated) {
              const d = JSON.parse(j.data);
              setPlants(d.plants || []);
              setJournal(d.journal || {});
              setWishlist(d.wishlist || []);
              setNeeds(d.needs || []);
              setInventory(d.inventory || []);
              setProfile(d.profile || null);
              await appStorage.set("garden:data", j.data);
              setSync({ code, at: Date.now() });
            } else if (localStr && localUpdated > ((j && j.updatedAt) || 0)) {
              pushNow(code, localStr);
            } else {
              setSync({ code, at: Date.now() });
            }
          } else if (r.status === 404 && localStr) {
            pushNow(code, localStr);
          }
        } catch (e) { /* офлайн — поработаем локально, подтянется позже */ }
      }
    })();
  }, []);

  useEffect(() => {
    if (!loaded || plants.length === 0) return;
    (async () => {
      const today = new Date().toISOString().slice(0, 10);
      try {
        const r = await appStorage.get("garden:mood");
        const m = JSON.parse(r.value);
        if (m.date === today && m.text) { setMood(m.text); return; }
      } catch (e) { /* кэша нет */ }
      try {
        const text = await gardenMood(plants, journal, dueList.length);
        if (text) {
          setMood(text);
          try { await appStorage.set("garden:mood", JSON.stringify({ date: today, text })); } catch (e) {}
        }
      } catch (e) { /* без настроения тоже можно жить */ }
    })();
  }, [loaded]);

  async function persist(nextPlants, nextJournal, nextWishlist, nextProfile, nextNeeds, nextInventory) {
    const payload = JSON.stringify({
      plants: nextPlants,
      journal: nextJournal,
      wishlist: nextWishlist,
      profile: nextProfile,
      needs: nextNeeds,
      inventory: nextInventory,
      updatedAt: Date.now(),
    });
    if (payload.length > 4_500_000 && !sizeWarned.current) {
      sizeWarned.current = true;
      showToast("Хранилище почти заполнено — стоит удалить старые фото из галерей 📸");
    }
    try {
      await appStorage.set("garden:data", payload);
    } catch (e) {
      showToast("Не удалось сохранить — проверьте связь");
    }
    if (SYNC_BASE && sync.code) schedulePush(sync.code, payload);
  }

  async function pushNow(code, payload) {
    try {
      const r = await fetch(SYNC_BASE + "/sync/put", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, data: payload }),
      });
      if (r.ok) {
        setSync((s) => ({ ...s, at: Date.now() }));
        return true;
      }
    } catch (e) { /* офлайн — уйдёт при следующем изменении */ }
    return false;
  }

  function schedulePush(code, payload) {
    if (syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => { pushNow(code, payload); }, 1500);
  }

  async function enableSync() {
    const code = genSyncCode();
    const payload = JSON.stringify({ plants, journal, wishlist, profile, needs, inventory, updatedAt: Date.now() });
    const ok = await pushNow(code, payload);
    if (!ok) { showToast("Не удалось включить — проверьте связь"); return; }
    try { await appStorage.set("garden:sync", JSON.stringify({ code })); } catch (e) {}
    setSync({ code, at: Date.now() });
    showToast("Синхронизация включена 🔗");
  }

  async function connectSync(codeRaw) {
    const code = (codeRaw || "").trim().toLowerCase();
    if (!code) return;
    if (plants.length > 0 && !window.confirm("Сад на этом устройстве будет заменён садом из кода. Продолжить?")) return;
    try {
      const r = await fetch(SYNC_BASE + "/sync/get?code=" + encodeURIComponent(code));
      if (r.status === 404) { showToast("Сад с таким кодом не найден"); return; }
      if (!r.ok) throw new Error();
      const j = await r.json();
      const d = JSON.parse(j.data);
      setPlants(d.plants || []);
      setJournal(d.journal || {});
      setWishlist(d.wishlist || []);
      setNeeds(d.needs || []);
      setInventory(d.inventory || []);
      setProfile(d.profile || null);
      await appStorage.set("garden:data", j.data);
      await appStorage.set("garden:sync", JSON.stringify({ code }));
      setSync({ code, at: Date.now() });
      setView("garden");
      showToast("Сад подключён 🔗");
    } catch (e) {
      showToast("Не получилось — проверьте код и связь");
    }
  }

  async function disableSync() {
    try { await appStorage.delete("garden:sync"); } catch (e) {}
    setSync({ code: null, at: null });
    showToast("Синхронизация отключена на этом устройстве");
  }

  function addNeed(text, plantId) {
    const t = (text || "").trim();
    if (!t) return;
    update(plants, journal, undefined, [{ id: uid(), text: t, plantId: plantId || null, addedAt: now() }, ...needs]);
    showToast("Записано в нужное 🧺");
  }

  function buyNeed(item) {
    const nn = needs.filter((n) => n.id !== item.id);
    const ni = [{ id: uid(), name: item.text, category: "other", note: "из «Нужного»", addedAt: now() }, ...inventory];
    if (item.plantId && plants.find((p) => p.id === item.plantId)) {
      const nj = addJournal(item.plantId, "event", "Куплено: " + item.text + " 🧺");
      update(plants, nj, undefined, nn, ni);
    } else {
      update(plants, journal, undefined, nn, ni);
    }
    showToast("Куплено ✓ — добавлено в инвентарь 🧰");
  }

  function addInvItem(name, category, note) {
    const t = (name || "").trim();
    if (!t) return;
    update(plants, journal, undefined, undefined,
      [{ id: uid(), name: t, category: category || "other", note: (note || "").trim(), addedAt: now() }, ...inventory]);
    showToast("Добавлено в инвентарь 🧰");
  }

  function patchInvItem(id, patch) {
    update(plants, journal, undefined, undefined,
      inventory.map((i) => (i.id === id ? { ...i, ...patch } : i)));
  }

  function removeInvItem(id) {
    update(plants, journal, undefined, undefined, inventory.filter((i) => i.id !== id));
  }

  function removeNeed(id) {
    update(plants, journal, undefined, needs.filter((n) => n.id !== id));
  }

  function update(nextPlants, nextJournal, nextWishlist, nextNeeds, nextInventory) {
    const nw = nextWishlist !== undefined ? nextWishlist : wishlist;
    const nn = nextNeeds !== undefined ? nextNeeds : needs;
    const ni = nextInventory !== undefined ? nextInventory : inventory;
    setPlants(nextPlants);
    setJournal(nextJournal);
    setWishlist(nw);
    setNeeds(nn);
    setInventory(ni);
    persist(nextPlants, nextJournal, nw, profile, nn, ni);
  }

  function saveProfile(p) {
    setProfile(p);
    persist(plants, journal, wishlist, p, needs, inventory);
  }

  const apartment = useMemo(() => apartmentText(profile), [profile]);
  const invText = useMemo(() => inventoryText(inventory), [inventory]);
  const spotChoices = useMemo(() => spotsFromProfile(profile), [profile]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  }

  function addJournal(plantId, type, text, extra) {
    const entry = { id: uid(), date: now(), type, text, ...(extra || {}) };
    const nj = { ...journal, [plantId]: [entry, ...(journal[plantId] || [])] };
    return nj;
  }

  /* ── действия ухода ── */
  function waterPlant(p) {
    const np = plants.map((x) => (x.id === p.id ? { ...x, lastWatered: now() } : x));
    const nj = addJournal(p.id, "water", "Полив 💧");
    update(np, nj);
    showToast(`${p.nickname || p.name} напоено 💧`);
  }
  function feedPlant(p) {
    const np = plants.map((x) => (x.id === p.id ? { ...x, lastFed: now() } : x));
    const nj = addJournal(p.id, "feed", "Подкормка 🌿");
    update(np, nj);
    showToast(`${p.nickname || p.name} подкормлено 🌿`);
  }
  function deletePlant(p) {
    if (!window.confirm(`Убрать «${p.name}» из сада? Дневник растения тоже удалится.`)) return;
    const np = plants.filter((x) => x.id !== p.id);
    const nj = { ...journal };
    delete nj[p.id];
    update(np, nj, undefined, needs.filter((n) => n.plantId !== p.id));
    setView("garden");
  }

  /* ── что «пора» ── */
  function dueInfo(p) {
    const interval = isSummer() ? p.care?.wateringSummer : p.care?.wateringWinter;
    const dw = daysSince(p.lastWatered || p.addedAt);
    const waterDue = interval && dw !== null && dw >= interval;
    let feedDue = false;
    if (isSummer() && p.care?.feedIntervalSummerDays) {
      const df = daysSince(p.lastFed || p.addedAt);
      feedDue = df !== null && df >= p.care.feedIntervalSummerDays;
    }
    return { waterDue, feedDue, dw, interval };
  }

  const dueList = useMemo(
    () =>
      plants
        .map((p) => ({ p, ...dueInfo(p) }))
        .filter((x) => x.waterDue || x.feedDue),
    [plants]
  );

  const balconyAutumn = useMemo(() => {
    const m = new Date().getMonth() + 1;
    return (m >= 8 && m <= 10) && plants.some((p) => p.location === "balcony");
  }, [plants]);

  /* ── экспорт / импорт ── */
  function exportGarden() {
    const blob = new Blob([JSON.stringify({ plants, journal, wishlist, profile, needs, inventory }, null, 2)], {
      type: "application/json",
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "мой-сад.json";
    a.click();
    localStorage.setItem("garden:lastBackup", String(Date.now()));
    setLastBackup(Date.now());
  }
  const importRef = useRef(null);
  async function importGarden(file) {
    try {
      const text = await file.text();
      const d = JSON.parse(text);
      if (!Array.isArray(d.plants)) throw new Error();
      setPlants(d.plants);
      setJournal(d.journal || {});
      setWishlist(d.wishlist || []);
      setNeeds(d.needs || []);
      setInventory(d.inventory || []);
      setProfile(d.profile || null);
      persist(d.plants, d.journal || {}, d.wishlist || [], d.profile || null, d.needs || [], d.inventory || []);
      showToast("Сад восстановлен из копии 🌱");
    } catch {
      showToast("Файл не похож на копию сада");
    }
  }

  /* ── фильтрация каталога ── */
  const shown = plants.filter((p) => {
    if (filter !== "all" && p.location !== filter) return false;
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return [p.name, p.nickname, p.care?.latinName, p.spot]
      .filter(Boolean)
      .some((s) => s.toLowerCase().includes(q));
  });

  const openPlant = plants.find((p) => p.id === openId);

  if (!loaded) {
    return (
      <div style={{ ...serif, minHeight: "100vh", background: C.paper, display: "flex", alignItems: "center", justifyContent: "center", color: C.moss }}>
        <div style={{ textAlign: "center" }}>
          <LeafMark size={40} />
          <div style={{ marginTop: 8, fontStyle: "italic" }}>сад просыпается…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.paper, color: C.ink }}>
      <div
        aria-hidden="true"
        style={{
          position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none",
          backgroundImage: `url(${WALLPAPER})`,
          backgroundSize: "cover", backgroundPosition: "center 28%",
          opacity: 0.13,
        }}
      />
      {/* ── шапка ── */}
      <header style={{ position: "relative", zIndex: 1, padding: "28px 20px 18px", borderBottom: `1px solid ${C.line}` }}>
        <Watercolor />
        <div style={{ position: "relative", maxWidth: 760, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <h1 style={{ ...serif, fontSize: 34, margin: 0, fontWeight: 400, color: C.ink }}>
              Мой сад
            </h1>
            <span style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 15 }}>
              {plants.length > 0
                ? `${plants.length} ${plural(plants.length, "растение", "растения", "растений")}`
                : "самое начало"}
            </span>
          </div>
          {mood && (
            <div style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 14, marginTop: 6 }}>
              {mood}
            </div>
          )}
          <nav style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
            <Chip active={view === "garden"} onClick={() => setView("garden")}>🌿 Сад</Chip>
            <Chip active={view === "today"} onClick={() => setView("today")}>
              ☀️ Сегодня{dueList.length > 0 ? ` · ${dueList.length}` : ""}
            </Chip>
            <Chip active={view === "chat"} onClick={() => setView("chat")}>💬 Садовник</Chip>
            <Chip active={view === "wishlist"} onClick={() => setView("wishlist")}>
              🌷 Вишлист{wishlist.length > 0 ? ` · ${wishlist.length}` : ""}
            </Chip>
            <Chip active={view === "supplies"} onClick={() => setView("supplies")}>
              🧺 Хозяйство{needs.length > 0 ? ` · ${needs.length}` : ""}
            </Chip>
            <Chip active={view === "stats"} onClick={() => setView("stats")}>📊 Статистика</Chip>
            <Chip active={view === "setup"} onClick={() => setView("setup")}>🏡 Квартира</Chip>
            <div style={{ flex: 1 }} />
            <Chip active={view === "add"} onClick={() => setView("add")}>+ Новое растение</Chip>
          </nav>
        </div>
      </header>

      <main style={{ position: "relative", zIndex: 1, maxWidth: 760, margin: "0 auto", padding: "20px 20px 60px" }}>
        {!AI_READY && (
          <div style={{ background: C.blossomSoft, border: `1px solid ${C.blossom}44`, borderRadius: 14, padding: "10px 14px", marginBottom: 16, ...sans, fontSize: 13, color: C.ink }}>
            ⚙️ ИИ-функции появятся после настройки прокси — см. инструкцию. Каталог и напоминания работают уже сейчас.
          </div>
        )}
        {!profile || view === "setup" ? (
          <ProfileSetup
            profile={profile}
            firstRun={!profile}
            onSave={(p) => {
              saveProfile(p);
              setView("garden");
              showToast("Квартира записана 🏡");
            }}
            onCancel={() => setView("garden")}
            onImport={() => importRef.current && importRef.current.click()}
            syncAvailable={!!SYNC_BASE}
            sync={sync}
            onEnableSync={enableSync}
            onConnectSync={connectSync}
            onDisableSync={disableSync}
          />
        ) : (
        <>
        {view === "garden" && (
          <GardenView
            shown={shown}
            total={plants.length}
            filter={filter}
            setFilter={setFilter}
            search={search}
            setSearch={setSearch}
            dueInfo={dueInfo}
            onOpen={(id) => { setOpenId(id); setView("plant"); }}
            onAdd={() => setView("add")}
            onExport={exportGarden}
            onImportClick={() => importRef.current && importRef.current.click()}
            onSettings={() => setView("setup")}
            backupNudge={plants.length > 0 && (!lastBackup || Date.now() - lastBackup > 30 * 86400000)}
          />
        )}
        {view === "today" && (
          <TodayView dueList={dueList} balconyAutumn={balconyAutumn} plants={plants}
            dueInfoFn={dueInfo}
            onVacation={() => setView("vacation")}
            onWater={waterPlant} onFeed={feedPlant}
            onOpen={(id) => { setOpenId(id); setView("plant"); }} />
        )}
        {view === "add" && (
          <AddView
            plants={plants}
            prefillName={prefillName}
            spots={spotChoices}
            apartment={apartment}
            onEditPlaces={() => setView("setup")}
            onDone={(plant) => {
              const np = [plant, ...plants];
              const nj = addJournal(plant.id, "event", "Добавлено в каталог 🌱");
              /* addJournal читает state journal — сольём вручную */
              const merged = { ...journal, [plant.id]: nj[plant.id] };
              const nw = wishlist.filter(
                (w) => w.name.trim().toLowerCase() !== plant.name.trim().toLowerCase()
              );
              update(np, merged, nw);
              setPrefillName("");
              setView("garden");
              showToast(`${plant.nickname || plant.name} теперь в саду 🌱`);
            }}
            onCancel={() => { setPrefillName(""); setView("garden"); }}
            showToast={showToast}
          />
        )}
        {view === "wishlist" && (
          <WishlistView
            wishlist={wishlist}
            plants={plants}
            journal={journal}
            apartment={apartment}
            onAdd={(name) => update(plants, journal, [{ id: uid(), name, addedAt: now() }, ...wishlist])}
            onRemove={(id) => update(plants, journal, wishlist.filter((w) => w.id !== id))}
            onVerdict={(id, v) =>
              update(plants, journal, wishlist.map((w) => (w.id === id ? { ...w, ...v } : w)))
            }
            onPlant={(w) => { setPrefillName(w.name); setView("add"); }}
            showToast={showToast}
          />
        )}
        {view === "stats" && (
          <StatsView plants={plants} journal={journal}
            onOpen={(id) => { setOpenId(id); setView("plant"); }} />
        )}
        {view === "supplies" && (
          <SuppliesView
            needs={needs} inventory={inventory} plants={plants} journal={journal}
            apartment={apartment} invText={invText}
            onAddNeed={(t) => addNeed(t, null)} onBuy={buyNeed} onRemoveNeed={removeNeed}
            onAddInv={addInvItem} onPatchInv={patchInvItem} onRemoveInv={removeInvItem}
            onOpenPlant={(id) => { setOpenId(id); setView("plant"); }}
            showToast={showToast} />
        )}
        {view === "vacation" && (
          <VacationView plants={plants} dueInfoFn={dueInfo}
            onBack={() => setView("today")} showToast={showToast} />
        )}
        {view === "plant" && openPlant && (
          <PlantView
            plant={openPlant}
            apartment={apartment}
            invText={invText}
            inventory={inventory}
            spots={spotChoices}
            onMove={(loc, spotStr) => {
              const np = plants.map((x) => (x.id === openPlant.id ? { ...x, location: loc, spot: spotStr } : x));
              const nj = addJournal(openPlant.id, "event", "Переставлено: " + spotStr + " 🪴");
              update(np, nj);
              showToast("Переставлено 🪴");
            }}
            entries={journal[openPlant.id] || []}
            dueInfo={dueInfo(openPlant)}
            onBack={() => setView("garden")}
            onWater={() => waterPlant(openPlant)}
            onFeed={() => feedPlant(openPlant)}
            onDelete={() => deletePlant(openPlant)}
            onNote={(text) => {
              const nj = addJournal(openPlant.id, "note", text);
              update(plants, nj);
            }}
            onDeleteEntry={(entryId) => {
              const nj = { ...journal, [openPlant.id]: (journal[openPlant.id] || []).filter((e) => e.id !== entryId) };
              update(plants, nj);
              showToast("Запись удалена");
            }}
            onDiagnosis={(result) => {
              const text = `Осмотр: ${result.status}${result.plan?.length ? " → " + result.plan.join("; ") : ""}`;
              const nj = addJournal(openPlant.id, "diagnosis", text, { severity: result.severity });
              update(plants, nj);
            }}
            onUpdateCare={(care) => {
              const np = plants.map((x) => (x.id === openPlant.id ? { ...x, care } : x));
              update(np, journal);
              showToast("Паспорт ухода обновлён ✒️");
            }}
            onEdit={(patch) => {
              const np = plants.map((x) => (x.id === openPlant.id ? { ...x, ...patch } : x));
              update(np, journal);
              showToast("Карточка обновлена ✒️");
            }}
            onGalleryAdd={(src) => {
              const np = plants.map((x) =>
                x.id === openPlant.id
                  ? { ...x, gallery: [{ id: uid(), date: now(), src }, ...(x.gallery || [])] }
                  : x
              );
              const nj = addJournal(openPlant.id, "event", "Новое фото в галерее 📸");
              update(np, nj);
              showToast("Фото добавлено в галерею 📸");
            }}
            needs={needs.filter((n) => n.plantId === openPlant.id)}
            onAddNeed={(t) => addNeed(t, openPlant.id)}
            onBuyNeed={buyNeed}
            onRemoveNeed={removeNeed}
            onGalleryDelete={(gid) => {
              const np = plants.map((x) =>
                x.id === openPlant.id
                  ? { ...x, gallery: (x.gallery || []).filter((g) => g.id !== gid) }
                  : x
              );
              update(np, journal);
              showToast("Фото удалено");
            }}
            showToast={showToast}
          />
        )}
        {view === "chat" && <ChatView plants={plants} journal={journal} apartment={apartment} invText={invText} />}
        </>
        )}
      </main>

      {/* импорт */}
      <input
        ref={importRef}
        type="file"
        accept="application/json"
        style={{ display: "none" }}
        onChange={(e) => e.target.files[0] && importGarden(e.target.files[0])}
      />

      {toast && (
        <div
          style={{
            ...sans, position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)",
            background: C.ink, color: C.paper, padding: "10px 18px", borderRadius: 999,
            fontSize: 14, boxShadow: "0 4px 14px rgba(46,68,51,0.3)", zIndex: 50,
          }}
        >
          {toast}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────  Каталог  ───────────────────────── */
function GardenView({ shown, total, filter, setFilter, search, setSearch, dueInfo, onOpen, onAdd, onExport, onImportClick, onSettings, backupNudge }) {
  if (total === 0) {
    return (
      <div style={{ textAlign: "center", padding: "70px 20px" }}>
        <LeafMark size={54} />
        <h2 style={{ ...serif, fontWeight: 400, fontSize: 24, margin: "16px 0 8px" }}>
          Сад пока пуст
        </h2>
        <p style={{ ...sans, color: C.moss, fontSize: 15, maxWidth: 380, margin: "0 auto 22px" }}>
          Добавьте первое растение — достаточно названия, а паспорт ухода я составлю сама.
        </p>
        <Btn onClick={onAdd} tone="moss">Посадить первое растение</Btn>
        <div style={{ marginTop: 26 }}>
          <button onClick={onImportClick} style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
            восстановить сад из копии
          </button>
        </div>
      </div>
    );
  }
  return (
    <div>
      {backupNudge && (
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", background: C.waterSoft, borderRadius: 14, padding: "10px 14px", marginBottom: 14, ...sans, fontSize: 13, color: C.ink }}>
          <span style={{ flex: 1, minWidth: 200 }}>
            🗂 Сад хранится в этом браузере — давно не было резервной копии.
          </span>
          <Btn small tone="water" onClick={onExport}>Скачать копию</Btn>
        </div>
      )}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 16 }}>
        <Chip active={filter === "all"} onClick={() => setFilter("all")}>Все</Chip>
        <Chip active={filter === "home"} onClick={() => setFilter("home")}>🏠 Дома</Chip>
        <Chip active={filter === "balcony"} onClick={() => setFilter("balcony")}>🌤 Балкон</Chip>
        <input
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Найти растение…"
          style={{ ...inputStyle, width: "auto", flex: 1, minWidth: 150, padding: "7px 12px", fontSize: 14 }}
        />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 12 }}>
        {shown.map((p) => {
          const d = dueInfo(p);
          return (
            <button
              key={p.id}
              onClick={() => onOpen(p.id)}
              style={{
                textAlign: "left", background: "#fffef9", border: `1px solid ${C.line}`,
                borderRadius: 16, padding: 12, cursor: "pointer", display: "flex", gap: 12,
              }}
            >
              <PlantThumb plant={p} />
              <div style={{ minWidth: 0 }}>
                <div style={{ ...serif, fontSize: 17, color: C.ink }}>
                  {p.nickname || p.name}
                </div>
                <div style={{ ...serif, fontStyle: "italic", fontSize: 13, color: C.sage }}>
                  {p.nickname ? p.name : p.care?.latinName || ""}
                </div>
                <div style={{ ...sans, fontSize: 12, color: C.moss, marginTop: 4 }}>
                  {p.location === "balcony" ? "🌤 балкон" : "🏠 дома"}
                  {p.spot ? ` · ${p.spot}` : ""}
                </div>
                {(d.waterDue || d.feedDue) && (
                  <div style={{ ...sans, fontSize: 12, color: C.blossom, marginTop: 4 }}>
                    {d.waterDue ? "хочет пить 💧" : "ждёт подкормки 🌿"}
                  </div>
                )}
              </div>
            </button>
          );
        })}
      </div>
      {shown.length === 0 && (
        <p style={{ ...sans, color: C.sage, textAlign: "center", marginTop: 30 }}>
          Никого не нашлось — попробуйте другое имя.
        </p>
      )}

      <div style={{ marginTop: 34, textAlign: "center", display: "flex", gap: 18, justifyContent: "center", flexWrap: "wrap" }}>
        <button onClick={onSettings} style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
          🏡 настроить квартиру
        </button>
        <button onClick={onExport} style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
          скачать копию сада
        </button>
        <button onClick={onImportClick} style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
          восстановить из копии
        </button>
        <span style={{ ...sans, fontSize: 12, color: C.sage, opacity: 0.7 }}>v{APP_VERSION}</span>
      </div>
    </div>
  );
}

/* ─────────────────────────  Сегодня  ───────────────────────── */
function TodayView({ dueList, balconyAutumn, plants, dueInfoFn, onVacation, onWater, onFeed, onOpen }) {
  const balconyPlants = plants.filter((p) => p.location === "balcony");
  const schedule = plants
    .map((p) => {
      const d = dueInfoFn(p);
      const left = d.interval && d.dw !== null ? d.interval - d.dw : null;
      return { p, ...d, left };
    })
    .sort((a, b) => (a.left === null ? 999 : a.left) - (b.left === null ? 999 : b.left));
  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap", margin: "4px 0 16px" }}>
        <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: 0, flex: 1 }}>
          {new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" })}
        </h2>
        {plants.length > 0 && (
          <Btn small tone="ghost" onClick={onVacation}>🏖 Уезжаете?</Btn>
        )}
      </div>

      {balconyAutumn && (
        <div style={{ background: C.blossomSoft, border: `1px solid ${C.blossom}33`, borderRadius: 14, padding: "12px 16px", marginBottom: 16, ...sans, fontSize: 14, color: C.ink }}>
          🍂 Осень близко: следите за ночными температурами на балконе.
          {balconyPlants.filter((p) => p.care?.minTempC != null).map((p) => (
            <div key={p.id} style={{ fontSize: 13, color: C.moss, marginTop: 4 }}>
              {p.nickname || p.name} — заносить при ниже {p.care.minTempC}°C
            </div>
          ))}
        </div>
      )}

      {dueList.length === 0 ? (
        <div style={{ textAlign: "center", padding: "50px 20px" }}>
          <div style={{ fontSize: 40 }}>🌸</div>
          <p style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 17, marginTop: 10 }}>
            Все напоены и довольны. Сад шлёт привет.
          </p>
        </div>
      ) : (
        dueList.map(({ p, waterDue, feedDue, dw, interval }) => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 16, padding: 12, marginBottom: 10 }}>
            <button onClick={() => onOpen(p.id)} style={{ background: "none", border: "none", padding: 0, cursor: "pointer" }}>
              <PlantThumb plant={p} size={54} />
            </button>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ ...serif, fontSize: 16 }}>{p.nickname || p.name}</div>
              <div style={{ ...sans, fontSize: 13, color: C.moss }}>
                {waterDue && `хочет пить — ${dw} дн. без полива (норма ${interval})`}
                {waterDue && feedDue && " · "}
                {feedDue && "ждёт подкормки"}
              </div>
            </div>
            {waterDue && <Btn small tone="water" onClick={() => onWater(p)}>Полить</Btn>}
            {feedDue && <Btn small tone="moss" onClick={() => onFeed(p)}>Подкормить</Btn>}
          </div>
        ))
      )}

      {plants.length > 0 && (
        <div>
          <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "30px 0 2px" }}>
            Схема полива сада
          </h3>
          <p style={{ ...sans, fontSize: 12, color: C.sage, margin: "0 0 10px" }}>
            интервалы {isSummer() ? "летние" : "зимние"}, со сменой сезона пересчитаются сами
          </p>
          {schedule.map(({ p, interval, left }) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderBottom: `1px solid ${C.line}` }}>
              <button onClick={() => onOpen(p.id)} style={{ background: "none", border: "none", padding: 0, cursor: "pointer" }}>
                <PlantThumb plant={p} size={34} radius={9} />
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ ...serif, fontSize: 15 }}>{p.nickname || p.name}</div>
                <div style={{ ...sans, fontSize: 12, color: C.moss }}>
                  💧 раз в {interval || "?"} дн.
                  {isSummer() && p.care?.feedIntervalSummerDays
                    ? ` · 🌿 подкормка раз в ${p.care.feedIntervalSummerDays} дн.`
                    : ""}
                </div>
              </div>
              <div style={{ ...sans, fontSize: 13, whiteSpace: "nowrap", color: left !== null && left <= 0 ? C.blossom : C.moss }}>
                {left === null ? "" : left <= 0 ? "пора 💧" : left === 1 ? "завтра" : `через ${left} дн.`}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────  Добавление растения  ───────────────────────── */
function AddView({ onDone, onCancel, showToast, plants, prefillName, spots, apartment, onEditPlaces }) {
  const [name, setName] = useState(prefillName || "");
  const [placeHint, setPlaceHint] = useState(null);
  const [placeBusy, setPlaceBusy] = useState(false);
  const [idBusy, setIdBusy] = useState(false);
  const [idNote, setIdNote] = useState("");
  const [photoSrcChoose, setPhotoSrcChoose] = useState(false);
  const [prevName, setPrevName] = useState(null);

  async function identifyFrom(dataUrl) {
    const source = dataUrl || photo;
    if (!source) return;
    const nameAtCall = name;
    setIdBusy(true);
    setIdNote("");
    try {
      const r = await identifyPlant(source.split(",")[1]);
      if (r.name) {
        setPrevName((prev) => (prev === null ? nameAtCall : prev));
        setName(r.name);
      }
      setIdNote([r.latinName, r.note].filter(Boolean).join(" — "));
    } catch {
      showToast("Не удалось определить — попробуйте другое фото");
    }
    setIdBusy(false);
  }

  function cancelIdentify() {
    if (prevName !== null) setName(prevName);
    setPrevName(null);
    setIdNote("");
  }
  const [nickname, setNickname] = useState("");
  const [ownedSince, setOwnedSince] = useState("");
  const [location, setLocation] = useState("home");
  const [spot, setSpot] = useState("");
  const [photo, setPhoto] = useState(null);
  const [care, setCare] = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);
  const camRef = useRef(null);

  async function handlePhoto(file) {
    setPhotoSrcChoose(false);
    try {
      const thumb = await compressImage(file, 480, 0.72);
      setPhoto(thumb);
      if (!name.trim()) identifyFrom(thumb);
    } catch {
      showToast("Не получилось обработать фото");
    }
  }

  async function makePassport() {
    if (!name.trim()) { showToast("Сначала — название растения"); return; }
    setBusy(true);
    try {
      const c = await generatePassport(name.trim(), location, spot.trim(), apartment);
      setCare(c);
    } catch {
      showToast("Садовник задумался — попробуйте ещё раз");
    }
    setBusy(false);
  }

  function save() {
    onDone({
      id: uid(),
      name: name.trim(),
      nickname: nickname.trim(),
      ownedSince: ownedSince || null,
      location,
      spot: spot.trim(),
      photo,
      gallery: photo ? [{ id: uid(), date: now(), src: photo }] : [],
      care,
      addedAt: now(),
      lastWatered: null,
      lastFed: null,
    });
  }

  return (
    <div style={{ maxWidth: 480 }}>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: "4px 0 18px" }}>Новый житель сада</h2>

      <Field label="Можно начать с фото — вид определится сам">
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          {photo && <img src={photo} alt="" style={{ width: 64, height: 64, objectFit: "cover", borderRadius: 12 }} />}
          <Btn small tone={photo ? "ghost" : "water"} onClick={() => setPhotoSrcChoose(!photoSrcChoose)}>
            📷 {photo ? "Заменить фото" : "Добавить фото"}
          </Btn>
          {photo && !idBusy && (
            <Btn small tone="ghost" onClick={() => identifyFrom(photo)}>🔍 Определить вид</Btn>
          )}
        </div>
        {photoSrcChoose && (
          <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
            <Chip onClick={() => camRef.current && camRef.current.click()}>📷 Сфотографировать</Chip>
            <Chip onClick={() => fileRef.current && fileRef.current.click()}>🖼 Из галереи</Chip>
          </div>
        )}
        {idBusy && (
          <div style={{ ...serif, fontStyle: "italic", fontSize: 13, color: C.sage, marginTop: 6 }}>
            определяю вид…
          </div>
        )}
        {idNote && !idBusy && (
          <div style={{ ...serif, fontStyle: "italic", fontSize: 13, color: C.moss, marginTop: 6 }}>
            {idNote}
            {" · "}
            <button onClick={cancelIdentify}
              style={{ ...sans, background: "none", border: "none", color: C.blossom, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0, fontStyle: "normal" }}>
              не то, отменить
            </button>
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
          onChange={(e) => { if (e.target.files[0]) handlePhoto(e.target.files[0]); e.target.value = ""; }} />
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
          onChange={(e) => { if (e.target.files[0]) handlePhoto(e.target.files[0]); e.target.value = ""; }} />
      </Field>

      {!photo && (
        <div style={{ ...sans, fontSize: 12, color: C.sage, textAlign: "center", margin: "2px 0 14px" }}>
          — или начните с названия —
        </div>
      )}

      <Field label="Название растения">
        <input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="Монстера деликатесная" />
      </Field>
      <Field label="Домашнее имя (если есть)">
        <input style={inputStyle} value={nickname} onChange={(e) => setNickname(e.target.value)} placeholder="Моня" />
      </Field>
      <Field label="Как давно оно у вас (примерно, необязательно)">
        <input type="month" style={inputStyle} value={ownedSince}
          onChange={(e) => setOwnedSince(e.target.value)}
          max={new Date().toISOString().slice(0, 7)} />
      </Field>
      <Field label="Место в квартире">
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
          {spots.map((s) => (
            <Chip key={s.spot} active={spot === s.spot}
              onClick={() => { setSpot(s.spot); setLocation(s.location); }}>
              {s.label}
            </Chip>
          ))}
        </div>
        <input style={inputStyle} value={spot} onChange={(e) => setSpot(e.target.value)}
          placeholder="или уточните своими словами: полка над диваном…" />
        {onEditPlaces && (
          <button onClick={onEditPlaces}
            style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0, marginTop: 6 }}>
            нет нужного места? добавить в настройках квартиры
          </button>
        )}
      </Field>

      <div style={{ margin: "-4px 0 16px" }}>
        <button
          onClick={async () => {
            if (!name.trim()) { showToast("Сначала — название растения"); return; }
            setPlaceBusy(true);
            try {
              const hint = await suggestPlacement(name.trim(), plants, spots, apartment);
              setPlaceHint(hint);
            } catch {
              showToast("Садовник задумался — попробуйте ещё раз");
            }
            setPlaceBusy(false);
          }}
          disabled={placeBusy}
          style={{ ...sans, background: "none", border: "none", color: C.water, fontSize: 13, cursor: "pointer", textDecoration: "underline", padding: 0 }}
        >
          {placeBusy ? "смотрю на подоконники…" : "🧭 не знаете, куда поставить? спросить садовника"}
        </button>
        {placeHint && (
          <div style={{ marginTop: 10, background: C.waterSoft, borderRadius: 14, padding: "12px 14px", ...sans, fontSize: 14 }}>
            <div style={{ color: C.ink }}>
              <b>{placeHint.location === "balcony" ? "Балкон" : "Дома"}: {placeHint.spot}</b>
            </div>
            <div style={{ color: C.moss, marginTop: 4 }}>{placeHint.reason}</div>
            <div style={{ marginTop: 10 }}>
              <Btn small tone="water" onClick={() => { setLocation(placeHint.location === "balcony" ? "balcony" : "home"); setSpot(placeHint.spot); }}>
                Поставим сюда
              </Btn>
            </div>
          </div>
        )}
      </div>
      {!care ? (
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <Btn onClick={makePassport} disabled={busy}>
            {busy ? "Листаю справочники…" : "✒️ Составить паспорт ухода"}
          </Btn>
          <Btn tone="ghost" onClick={onCancel}>Отмена</Btn>
        </div>
      ) : (
        <div>
          <div style={{ background: C.sageSoft + "66", border: `1px solid ${C.line}`, borderRadius: 16, padding: 16, margin: "10px 0 16px" }}>
            <div style={{ ...serif, fontStyle: "italic", color: C.moss, marginBottom: 8 }}>
              {care.latinName} · {care.difficulty}
            </div>
            <PassportGrid care={care} />
            <p style={{ ...serif, fontStyle: "italic", fontSize: 14, color: C.moss, marginTop: 10, marginBottom: 0 }}>
              «{care.tip}»
            </p>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn onClick={save}>Добавить в сад 🌱</Btn>
            <Btn tone="ghost" onClick={makePassport} disabled={busy}>
              {busy ? "…" : "Пересоставить"}
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function PassportGrid({ care }) {
  const rows = [
    ["☀️ Свет", care.light],
    ["💧 Полив", `летом раз в ${care.wateringSummer} дн., зимой раз в ${care.wateringWinter} дн. ${care.wateringNote || ""}`],
    ["💨 Влажность", care.humidity],
    ["🌿 Подкормка", care.feeding],
    ["🪨 Грунт", care.soil],
    ["🪴 Пересадка", care.repotting],
    ["🌡 Минимум", care.minTempC != null ? `${care.minTempC}°C` : null],
  ].filter((r) => r[1]);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "7px 12px", ...sans, fontSize: 14 }}>
      {rows.map(([k, v]) => (
        <React.Fragment key={k}>
          <div style={{ color: C.moss, whiteSpace: "nowrap" }}>{k}</div>
          <div style={{ color: C.ink }}>{v}</div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ─────────────────────────  Карточка растения  ───────────────────────── */
function PlantView({ plant, apartment, invText, inventory, spots, onMove, entries, dueInfo, onBack, onWater, onFeed, onDelete, onNote, onDeleteEntry, onDiagnosis, onUpdateCare, onEdit, onGalleryAdd, onGalleryDelete, needs, onAddNeed, onBuyNeed, onRemoveNeed, showToast }) {
  const [note, setNote] = useState("");
  const [needText, setNeedText] = useState("");
  const [moving, setMoving] = useState(false);
  const [galSrc, setGalSrc] = useState(false);
  const [galView, setGalView] = useState(null);
  const galFileRef = useRef(null);
  const galCamRef = useRef(null);

  async function handleGalleryPhoto(f) {
    setGalSrc(false);
    try {
      const src = await compressImage(f, 560, 0.7);
      onGalleryAdd(src);
    } catch {
      showToast("Не получилось обработать фото");
    }
  }

  const [invOpen, setInvOpen] = useState(false);
  const invMatches = (inventory || [])
    .map((i) => {
      const m =
        i.ai &&
        (i.ai.matches || []).find(
          (x) => x.plant === (plant.nickname || plant.name) || x.plant === plant.name
        );
      return m ? { item: i, how: m.how } : null;
    })
    .filter(Boolean);
  const [editing, setEditing] = useState(false);
  const [eName, setEName] = useState("");
  const [eNickname, setENickname] = useState("");
  const [eOwned, setEOwned] = useState("");
  const [ePhoto, setEPhoto] = useState(null);
  const editFileRef = useRef(null);
  const editCamRef = useRef(null);

  async function handleEditPhoto(f) {
    try { setEPhoto(await compressImage(f, 480, 0.72)); } catch { showToast("Не получилось обработать фото"); }
  }

  function startEdit() {
    setEName(plant.name);
    setENickname(plant.nickname || "");
    setEOwned(plant.ownedSince || "");
    setEPhoto(null);
    setEditing(true);
    setMoving(false);
  }

  function saveEdit() {
    if (!eName.trim()) { showToast("Название не может быть пустым"); return; }
    onEdit({
      name: eName.trim(),
      nickname: eNickname.trim(),
      ownedSince: eOwned || null,
      ...(ePhoto ? { photo: ePhoto } : {}),
    });
    setEditing(false);
  }
  const [careBusy, setCareBusy] = useState(false);
  const [qa, setQa] = useState([]);
  const [qaInput, setQaInput] = useState("");
  const [qaBusy, setQaBusy] = useState(false);

  async function sendQa() {
    const q = qaInput.trim();
    if (!q || qaBusy) return;
    const next = [...qa, { role: "user", content: q }];
    setQa(next);
    setQaInput("");
    setQaBusy(true);
    try {
      const answer = await plantAsk(next, plant, entries, apartment, invText);
      setQa([...next, { role: "assistant", content: answer || "…" }]);
    } catch {
      setQa([...next, { role: "assistant", content: "Не расслышала — спросите ещё раз?" }]);
    }
    setQaBusy(false);
  }

  async function refreshCare() {
    setCareBusy(true);
    try {
      const c = await generatePassport(plant.name, plant.location, plant.spot, apartment);
      onUpdateCare(c);
    } catch {
      showToast("Садовник задумался — попробуйте ещё раз");
    }
    setCareBusy(false);
  }
  const [diag, setDiag] = useState(null);
  const [diagBusy, setDiagBusy] = useState(false);
  const [diagSrc, setDiagSrc] = useState(false);
  const diagRef = useRef(null);
  const diagCamRef = useRef(null);

  async function handleDiagPhoto(file) {
    setDiagSrc(false);
    setDiagBusy(true);
    setDiag(null);
    try {
      const dataUrl = await compressImage(file, 900, 0.8);
      const base64 = dataUrl.split(",")[1];
      const result = await diagnosePlant(base64, "image/jpeg", plant, apartment, invText);
      setDiag(result);
      if (result.matchesPlant === false) {
        showToast("Похоже, на фото другое растение — в дневник не записываю");
      } else {
        onDiagnosis(result);
      }
    } catch {
      showToast("Осмотр не удался — попробуйте другое фото");
    }
    setDiagBusy(false);
  }

  const sevColor = { ok: C.sage, attention: C.sun, urgent: C.blossom };
  const sevLabel = { ok: "всё хорошо", attention: "стоит присмотреться", urgent: "нужна помощь" };

  return (
    <div>
      <button onClick={onBack} style={{ ...sans, background: "none", border: "none", color: C.moss, cursor: "pointer", fontSize: 14, padding: 0, marginBottom: 14 }}>
        ← в сад
      </button>

      <div style={{ display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
        <PlantThumb plant={plant} size={110} radius={20} />
        <div style={{ flex: 1, minWidth: 220 }}>
          <h2 style={{ ...serif, fontWeight: 400, fontSize: 26, margin: 0 }}>
            {plant.nickname || plant.name}
          </h2>
          <div style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 15 }}>
            {plant.nickname ? `${plant.name} · ` : ""}{plant.care?.latinName}
          </div>
          <div style={{ ...sans, fontSize: 13, color: C.moss, marginTop: 6 }}>
            {plant.location === "balcony" ? "🌤 балкон" : "🏠 дома"}
            {plant.spot ? ` · ${plant.spot}` : ""} · {plant.ownedSince ? `у вас с ${fmtMonth(plant.ownedSince)}` : `в каталоге с ${fmtDate(plant.addedAt)}`}
            {" · "}
            <button onClick={() => setMoving(!moving)}
              style={{ ...sans, background: "none", border: "none", color: C.water, fontSize: 13, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
              переставить
            </button>
            {" · "}
            <button onClick={startEdit}
              style={{ ...sans, background: "none", border: "none", color: C.water, fontSize: 13, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
              править
            </button>
          </div>
          {moving && (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8 }}>
              {(spots || []).map((s) => (
                <Chip key={s.spot} active={plant.spot === s.spot}
                  onClick={() => { onMove(s.location, s.spot); setMoving(false); }}>
                  {s.label}
                </Chip>
              ))}
            </div>
          )}
          {editing && (
            <div style={{ marginTop: 10, background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 14, padding: 12, maxWidth: 380 }}>
              <Field label="Название">
                <input style={inputStyle} value={eName} onChange={(e) => setEName(e.target.value)} />
              </Field>
              <Field label="Домашнее имя">
                <input style={inputStyle} value={eNickname} onChange={(e) => setENickname(e.target.value)} placeholder="Моня" />
              </Field>
              <Field label="Как давно оно у вас (примерно)">
                <input type="month" style={inputStyle} value={eOwned}
                  onChange={(e) => setEOwned(e.target.value)}
                  max={new Date().toISOString().slice(0, 7)} />
              </Field>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                {(ePhoto || plant.photo) && (
                  <img src={ePhoto || plant.photo} alt="" style={{ width: 48, height: 48, objectFit: "cover", borderRadius: 10 }} />
                )}
                <Btn small tone="ghost" onClick={() => editCamRef.current && editCamRef.current.click()}>📷 Снять</Btn>
                <Btn small tone="ghost" onClick={() => editFileRef.current && editFileRef.current.click()}>🖼 Галерея</Btn>
                <input ref={editFileRef} type="file" accept="image/*" style={{ display: "none" }}
                  onChange={(e) => { const f = e.target.files[0]; if (f) handleEditPhoto(f); e.target.value = ""; }} />
                <input ref={editCamRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
                  onChange={(e) => { const f = e.target.files[0]; if (f) handleEditPhoto(f); e.target.value = ""; }} />
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn small onClick={saveEdit}>Сохранить</Btn>
                <Btn small tone="ghost" onClick={() => setEditing(false)}>Отмена</Btn>
              </div>
            </div>
          )}
          <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
            <Btn small tone="water" onClick={onWater}>💧 Полить</Btn>
            <Btn small tone="moss" onClick={onFeed}>🌿 Подкормить</Btn>
            <Btn small tone="ghost" onClick={() => setDiagSrc(!diagSrc)} disabled={diagBusy}>
              {diagBusy ? "Осматриваю…" : "🔍 Осмотр по фото"}
            </Btn>
            <input ref={diagRef} type="file" accept="image/*" style={{ display: "none" }}
              onChange={(e) => e.target.files[0] && handleDiagPhoto(e.target.files[0])} />
            <input ref={diagCamRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
              onChange={(e) => e.target.files[0] && handleDiagPhoto(e.target.files[0])} />
          </div>
          {diagSrc && !diagBusy && (
            <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
              <Chip onClick={() => diagCamRef.current && diagCamRef.current.click()}>📷 Сфотографировать</Chip>
              <Chip onClick={() => diagRef.current && diagRef.current.click()}>🖼 Из галереи</Chip>
            </div>
          )}
          <div style={{ ...sans, fontSize: 13, color: dueInfo.waterDue ? C.blossom : C.sage, marginTop: 8 }}>
            {plant.lastWatered
              ? `последний полив ${daysSince(plant.lastWatered)} дн. назад`
              : "ещё ни разу не поливалось здесь"}
            {dueInfo.waterDue ? " — хочет пить" : ""}
          </div>
        </div>
      </div>

      {diag && (
        <div style={{ marginTop: 18, borderRadius: 16, border: `1px solid ${sevColor[diag.severity] || C.line}`, background: "#fffef9", padding: 16 }}>
          {diag.matchesPlant === false && (
            <div style={{ background: C.blossomSoft, borderRadius: 10, padding: "9px 12px", marginBottom: 12, ...sans, fontSize: 13, color: C.ink, lineHeight: 1.45 }}>
              ⚠️ Похоже, на фото не {plant.nickname || plant.name}
              {diag.seenPlant ? ` — скорее ${diag.seenPlant}` : ""}. Осмотр ниже — про растение со снимка, в дневник он не записан. Если это всё-таки {plant.nickname || plant.name}, попробуйте другой ракурс при дневном свете.
            </div>
          )}
          <div style={{ ...sans, fontSize: 12, color: sevColor[diag.severity], letterSpacing: 0.5, textTransform: "uppercase" }}>
            {sevLabel[diag.severity] || "осмотр"}
          </div>
          <div style={{ ...serif, fontSize: 17, margin: "6px 0 8px" }}>{diag.status}</div>
          {diag.issues?.length > 0 && (
            <ul style={{ ...sans, fontSize: 14, color: C.ink, margin: "0 0 8px", paddingLeft: 18 }}>
              {diag.issues.map((x, i) => <li key={i}>{x}</li>)}
            </ul>
          )}
          {diag.plan?.length > 0 && (
            <div style={{ ...sans, fontSize: 14 }}>
              <div style={{ color: C.moss, marginBottom: 4 }}>Что сделать:</div>
              <ol style={{ margin: 0, paddingLeft: 18 }}>
                {diag.plan.map((x, i) => <li key={i} style={{ marginBottom: 3 }}>{x}</li>)}
              </ol>
            </div>
          )}
        </div>
      )}

      {plant.care && (
        <div style={{ marginTop: 18, background: C.sageSoft + "66", border: `1px solid ${C.line}`, borderRadius: 16, padding: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10 }}>
            <div style={{ ...serif, fontStyle: "italic", color: C.moss }}>
              Паспорт ухода · {plant.care.difficulty}
            </div>
            <button onClick={refreshCare} disabled={careBusy}
              style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0, marginLeft: "auto" }}>
              {careBusy ? "обновляю…" : "обновить"}
            </button>
          </div>
          <PassportGrid care={plant.care} />
          {plant.care.tip && (
            <p style={{ ...serif, fontStyle: "italic", fontSize: 14, color: C.moss, marginTop: 10, marginBottom: 0 }}>
              «{plant.care.tip}»
            </p>
          )}
        </div>
      )}

      {invMatches.length > 0 && (
        <div style={{ marginTop: 18, background: C.waterSoft + "99", border: `1px solid ${C.line}`, borderRadius: 16, overflow: "hidden" }}>
          <button
            onClick={() => setInvOpen(!invOpen)}
            style={{ width: "100%", textAlign: "left", background: "none", border: "none", padding: "13px 16px", cursor: "pointer", display: "flex", alignItems: "baseline", gap: 8 }}
          >
            <span style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 15, flex: 1 }}>
              🧰 Из хозяйства подходит · {invMatches.length}
            </span>
            <span style={{ color: C.sage, fontSize: 11 }}>{invOpen ? "▲" : "▼"}</span>
          </button>
          {invOpen && (
            <div style={{ padding: "0 16px 14px" }}>
              {invMatches.map(({ item, how }) => (
                <div key={item.id} style={{ ...sans, fontSize: 14, padding: "4px 0", color: C.ink, lineHeight: 1.45 }}>
                  <b style={{ ...serif, fontWeight: 400 }}>{item.name}</b>
                  {item.note ? <span style={{ color: C.moss }}> ({item.note})</span> : null}
                  {" — "}{how}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div style={{ marginTop: 22 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap", marginBottom: 10 }}>
          <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: 0, flex: 1 }}>
            📸 Галерея{(plant.gallery || []).length > 0 ? ` · ${(plant.gallery || []).length}` : ""}
          </h3>
          <Btn small tone="ghost" onClick={() => setGalSrc(!galSrc)}>+ Добавить фото</Btn>
        </div>
        {galSrc && (
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
            <Chip onClick={() => galCamRef.current && galCamRef.current.click()}>📷 Сфотографировать</Chip>
            <Chip onClick={() => galFileRef.current && galFileRef.current.click()}>🖼 Из галереи</Chip>
          </div>
        )}
        <input ref={galFileRef} type="file" accept="image/*" style={{ display: "none" }}
          onChange={(e) => { if (e.target.files[0]) handleGalleryPhoto(e.target.files[0]); e.target.value = ""; }} />
        <input ref={galCamRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
          onChange={(e) => { if (e.target.files[0]) handleGalleryPhoto(e.target.files[0]); e.target.value = ""; }} />
        {(plant.gallery || []).length === 0 ? (
          <p style={{ ...sans, fontSize: 13, color: C.sage, margin: 0 }}>
            Добавляйте снимки время от времени — получится история роста.
          </p>
        ) : (
          <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 6 }}>
            {(plant.gallery || []).map((g) => (
              <button key={g.id} onClick={() => setGalView(g)}
                style={{ background: "none", border: "none", padding: 0, cursor: "pointer", flexShrink: 0 }}>
                <img src={g.src} alt="" style={{ width: 88, height: 88, objectFit: "cover", borderRadius: 12, display: "block" }} />
                <div style={{ ...sans, fontSize: 11, color: C.sage, marginTop: 3, textAlign: "center" }}>
                  {fmtDate(g.date)}
                </div>
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{ marginTop: 22 }}>
        <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "0 0 10px" }}>
          Спросить садовника про {plant.nickname || plant.name}
        </h3>
        {qa.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 8 }}>
            <div
              style={{
                ...sans, maxWidth: "85%", padding: "9px 13px", fontSize: 14, lineHeight: 1.5,
                whiteSpace: "pre-wrap",
                borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                background: m.role === "user" ? C.moss : "#fffef9",
                color: m.role === "user" ? C.paper : C.ink,
                border: m.role === "user" ? "none" : `1px solid ${C.line}`,
              }}
            >
              {m.content}
              {m.role === "assistant" && (
                <div style={{ marginTop: 6 }}>
                  <button
                    onClick={() => { onNote("Садовник: " + m.content); showToast("Записано в дневник ✒️"); }}
                    style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}
                  >
                    записать в дневник
                  </button>
                </div>
              )}
            </div>
          </div>
        ))}
        {qaBusy && (
          <div style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 13, marginBottom: 8 }}>
            садовник думает…
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          <input
            style={{ ...inputStyle, flex: 1 }}
            value={qaInput}
            onChange={(e) => setQaInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && sendQa()}
            placeholder="Почему скручиваются листья?"
          />
          <Btn small onClick={sendQa} disabled={qaBusy || !qaInput.trim()}>→</Btn>
        </div>
      </div>

      <div style={{ marginTop: 22 }}>
        <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "0 0 10px" }}>
          🧺 Нужное для {plant.nickname || plant.name}{(needs || []).length > 0 ? ` · ${needs.length}` : ""}
        </h3>
        {(needs || []).map((n) => (
          <div key={n.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "7px 0", borderBottom: `1px solid ${C.line}`, ...sans, fontSize: 14 }}>
            <div style={{ flex: 1, color: C.ink }}>{n.text}</div>
            <Btn small tone="ghost" onClick={() => onBuyNeed(n)}>✓ куплено</Btn>
            <button onClick={() => onRemoveNeed(n.id)} title="убрать"
              style={{ ...sans, background: "none", border: "none", color: C.sage, cursor: "pointer", fontSize: 15, padding: "0 2px" }}>
              ×
            </button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          <input style={{ ...inputStyle, flex: 1 }} value={needText}
            onChange={(e) => setNeedText(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && needText.trim()) { onAddNeed(needText); setNeedText(""); } }}
            placeholder="купить: земля для ароидных, ~3 л…" />
          <Btn small onClick={() => { if (needText.trim()) { onAddNeed(needText); setNeedText(""); } }}>В список</Btn>
        </div>
        <div style={{ ...sans, fontSize: 12, color: C.sage, marginTop: 6 }}>
          всё нужное собирается в общий список — вкладка 🧺 Хозяйство
        </div>
      </div>

      <div style={{ marginTop: 22 }}>
        <h3 style={{ ...serif, fontWeight: 400, fontSize: 18, margin: "0 0 10px" }}>Дневник</h3>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <input style={{ ...inputStyle, flex: 1 }} value={note} onChange={(e) => setNote(e.target.value)}
            placeholder="Новый лист! / переставила к окну…"
            onKeyDown={(e) => { if (e.key === "Enter" && note.trim()) { onNote(note.trim()); setNote(""); } }} />
          <Btn small onClick={() => { if (note.trim()) { onNote(note.trim()); setNote(""); } }}>Записать</Btn>
        </div>
        {entries.length === 0 ? (
          <p style={{ ...sans, fontSize: 14, color: C.sage }}>Пока ни одной записи — всё впереди.</p>
        ) : (
          entries.map((e) => (
            <div key={e.id} style={{ display: "flex", gap: 10, alignItems: "baseline", padding: "8px 0", borderBottom: `1px solid ${C.line}`, ...sans, fontSize: 14 }}>

/* ─────────────────────────  Чат-садовник  ───────────────────────── */
function ChatView({ plants, journal, apartment, invText }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [pendingImage, setPendingImage] = useState(null);
  const fileRef = useRef(null);
  const camRef = useRef(null);

  async function pickChatImage(e) {
    const f = e.target.files[0];
    if (!f) return;
    try { setPendingImage(await compressImage(f, 900, 0.8)); } catch { /* пропустим */ }
    e.target.value = "";
  }
  const bottomRef = useRef(null);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  async function send() {
    const q = input.trim();
    if ((!q && !pendingImage) || busy) return;
    const nextMsgs = [...messages, { role: "user", content: q, image: pendingImage }];
    setMessages(nextMsgs);
    setInput("");
    setPendingImage(null);
    setBusy(true);
    try {
      const photoRule =
        " Если человек прислал фото растения — внимательно осмотри его: оцени самочувствие (перелив или пересушка, свет, вредители, дефицит питания), дай короткий вердикт и конкретные рекомендации по шагам. Если растение похоже на одно из растений сада — учитывай его место и историю.";
      const context =
        plants.length > 0
          ? `Ты — тёплый, внимательный садовник-консультант домашнего сада. Отвечай по-русски, дружелюбно и по делу, без лишней воды. Сегодня ${new Date().toLocaleDateString("ru-RU")}. Про квартиру: ${apartment}${invText ? " " + invText + " Советуя средства и грунты, в первую очередь опирайся на то, что уже есть в хозяйстве." : ""}\nВот сад, о котором идёт речь:\n${buildGardenContext(plants, journal)}\n\nОтвечай с учётом конкретных растений сада, их мест, света в квартире и истории.${photoRule}`
          : `Ты — тёплый садовник-консультант. Про квартиру: ${apartment} Сад пока пуст, отвечай практичными советами по-русски с учётом условий квартиры.${photoRule}`;
      const apiMessages = [
        { role: "user", content: context },
        { role: "assistant", content: "Поняла, я садовник этого сада. Спрашивайте и присылайте фото!" },
        ...nextMsgs.slice(-12).map((m) =>
          m.image
            ? {
                role: m.role,
                content: [
                  {
                    type: "image",
                    source: { type: "base64", media_type: "image/jpeg", data: m.image.split(",")[1] },
                  },
                  {
                    type: "text",
                    text: m.content || "Осмотри растение на фото: как его самочувствие и что порекомендуешь?",
                  },
                ],
              }
            : { role: m.role, content: m.content }
        ),
      ];
      const answer = await askClaude(apiMessages);
      setMessages([...nextMsgs, { role: "assistant", content: answer || "…" }]);
    } catch {
      setMessages([...nextMsgs, { role: "assistant", content: "Не расслышала — в саду шумит ветер. Спросите ещё раз?" }]);
    }
    setBusy(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "55vh" }}>
      <div style={{ flex: 1 }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px" }}>
            <div style={{ fontSize: 36 }}>🌾</div>
            <p style={{ ...serif, fontStyle: "italic", color: C.moss, fontSize: 16, maxWidth: 400, margin: "10px auto 0" }}>
              Я знаю каждое растение вашего сада. Спросите, почему желтеют листья у монстеры, чем подкормить фикус — или просто пришлите фото 📷, осмотрю и скажу, как самочувствие.
            </p>
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
            <div
              style={{
                ...sans, maxWidth: "82%", padding: "10px 14px", fontSize: 15, lineHeight: 1.5,
                whiteSpace: "pre-wrap",
                borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                background: m.role === "user" ? C.moss : "#fffef9",
                color: m.role === "user" ? C.paper : C.ink,
                border: m.role === "user" ? "none" : `1px solid ${C.line}`,
              }}
            >
              {m.image && (
                <img src={m.image} alt="фото растения"
                  style={{ maxWidth: "100%", borderRadius: 10, marginBottom: m.content ? 8 : 0, display: "block" }} />
              )}
              {m.content}
            </div>
          </div>
        ))}
        {busy && (
          <div style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 14 }}>
            садовник думает…
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ marginTop: 16, position: "sticky", bottom: 12 }}>
        {pendingImage && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 12, padding: 8 }}>
            <img src={pendingImage} alt="" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8 }} />
            <span style={{ ...sans, fontSize: 13, color: C.moss, flex: 1 }}>
              фото приложено — можно добавить вопрос
            </span>
            <button onClick={() => setPendingImage(null)}
              style={{ ...sans, background: "none", border: "none", color: C.sage, cursor: "pointer", fontSize: 13, textDecoration: "underline" }}>
              убрать
            </button>
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={() => camRef.current && camRef.current.click()}
            title="Сфотографировать растение"
            style={{ ...sans, width: 46, borderRadius: 12, border: `1px solid ${C.line}`, background: "#fffef9", color: C.moss, fontSize: 18, cursor: "pointer" }}
          >
            📷
          </button>
          <button
            onClick={() => fileRef.current && fileRef.current.click()}
            title="Фото из галереи"
            style={{ ...sans, width: 46, borderRadius: 12, border: `1px solid ${C.line}`, background: "#fffef9", color: C.moss, fontSize: 18, cursor: "pointer" }}
          >
            🖼
          </button>
          <input
            style={{ ...inputStyle, flex: 1 }}
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && send()}
            placeholder={pendingImage ? "Что спросить про это фото?" : "Спросить садовника…"}
          />
          <Btn onClick={send} disabled={busy || (!input.trim() && !pendingImage)}>→</Btn>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
          onChange={pickChatImage} />
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
          onChange={pickChatImage} />
      </div>
    </div>
  );
}

/* ─────────────────────────  Вишлист  ───────────────────────── */
function WishlistView({ wishlist, plants, journal, apartment, onAdd, onRemove, onVerdict, onPlant, showToast }) {
  const [name, setName] = useState("");
  const [busyId, setBusyId] = useState(null);

  const fitColor = { good: C.sage, maybe: C.sun, hard: C.blossom };
  const fitLabel = { good: "приживётся", maybe: "с оговорками", hard: "будет непросто" };

  function add() {
    const n = name.trim();
    if (!n) return;
    onAdd(n);
    setName("");
  }

  async function check(item) {
    setBusyId(item.id);
    try {
      const v = await wishlistVerdict(item.name, plants, journal, apartment);
      onVerdict(item.id, { fit: v.fit, verdict: v.verdict });
    } catch {
      showToast("Садовник задумался — попробуйте ещё раз");
    }
    setBusyId(null);
  }

  return (
    <div style={{ maxWidth: 560 }}>
      <h2 style={{ ...serif, fontWeight: 400, fontSize: 22, margin: "4px 0 6px" }}>Растения мечты</h2>
      <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "0 0 16px" }}>
        Записывайте, кого хочется завести. Садовник подскажет, приживётся ли мечта в ваших условиях.
      </p>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <input
          style={{ ...inputStyle, flex: 1 }}
          value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && add()}
          placeholder="Стрелиция Николая…"
        />
        <Btn small onClick={add}>Загадать</Btn>
      </div>

      {wishlist.length === 0 ? (
        <div style={{ textAlign: "center", padding: "36px 20px" }}>
          <div style={{ fontSize: 36 }}>🌷</div>
          <p style={{ ...serif, fontStyle: "italic", color: C.sage, fontSize: 15, marginTop: 8 }}>
            Список мечты пока пуст — а зря, мечтать полезно.
          </p>
        </div>
      ) : (
        wishlist.map((w) => (
          <div key={w.id} style={{ background: "#fffef9", border: `1px solid ${C.line}`, borderRadius: 16, padding: 14, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
              <div style={{ ...serif, fontSize: 17, flex: 1 }}>{w.name}</div>
              {w.fit && (
                <span style={{ ...sans, fontSize: 12, color: fitColor[w.fit], border: `1px solid ${fitColor[w.fit]}`, borderRadius: 999, padding: "2px 10px" }}>
                  {fitLabel[w.fit]}
                </span>
              )}
            </div>
            {w.verdict && (
              <p style={{ ...sans, fontSize: 14, color: C.moss, margin: "8px 0 0" }}>{w.verdict}</p>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center", flexWrap: "wrap" }}>
              <Btn small tone="ghost" onClick={() => check(w)} disabled={busyId === w.id}>
                {busyId === w.id ? "Прикидываю…" : w.fit ? "Спросить снова" : "Приживётся ли?"}
              </Btn>
              <Btn small tone="moss" onClick={() => onPlant(w)}>Посадить 🌱</Btn>
              <button onClick={() => onRemove(w.id)} style={{ ...sans, background: "none", border: "none", color: C.sage, fontSize: 13, cursor: "pointer", textDecoration: "underline", marginLeft: "auto" }}>
                убрать
              </button>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ─────────────────────────  Нужное (список покупок)  ───────────────────────── */
function NeedsView({ needs, plants, journal, apartment, invText, onAdd, onBuy, onRemove, onOpenPlant, showToast }) {
  const [text, setText] = useState("");
  const [aiBusy, setAiBusy] = useState(false);

    setText("");

    try {
      const answer = await needsOrder(needs, plants, journal, apartment, invText);

      <button onClick={() => onRemove(n.id)} title="убрать"

  return (
    <div style={{ maxWidth: 600 }}>
